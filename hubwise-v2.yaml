    patch:
      tags:
        - Accounts
      summary: archive an accounts fee
      description: >-
        
        Archives an existing active fee record for an active investment account.

        This endpoint supports the modification of the end date for an active account fee. The end date can only be set to yesterday's date. To add a new fee the Create fee API will need to be used. 
        
        The end date can only be set for the following fee types:

        1.  ADVISER_ANNUAL

        2.  PORTFOLIO_MANAGEMENT

        3. INVESTMENT_MANAGEMENT

      operationId: archiveAccountFee
      parameters:
        - $ref: '#/components/parameters/Request-Id'
        - name: accountId
          in: path
          description: Unique SS&C Wealth Platform Account identifier
          required: true
          schema:
            type: string
            maxLength: 11
          example: HW04003259A
        - name: feeId
          in: path
          description: Unique SS&C Wealth Platform Fee identifier
          required: true
          schema:
            type: integer
          example: 1
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FeesHeaderPatch"
            examples:
              Ex1:
                summary: Archive an account fee
