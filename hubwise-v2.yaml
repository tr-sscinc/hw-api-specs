    VulnerabilityCorrespondence:
      description: Duplicate correspondence and startDate not allowed.
      required:
        - type
      type: object
      additionalProperties: false
      properties:
        type:
          type: string
          description: >-
            The preferred correspondence format or access arrangement required by the investor to support effective communication and accessibility
          example: LARGE_PRINT
          enum:
            - AUDIO
            - BRAILLE
            - LARGE_PRINT
            - ERROR
        startDate:
          type: string
          description: Vulnerabilities start date (any date). Defaulted to current date if not provided.
          format: date
          example: "2025-01-01"
        expiryDate:
          type: string
          description: Vulnerabilities expiry date (must be after the start date)
          format: date
          example: "2026-01-01"
        adviserId:
          type: string
          maxLength: 14
          readOnly: true
          description: Unique SS&C Hubwise Adviser identifier

    Vulnerability:
      required:
        - type
        - serviceLevel
      description: Duplicate vulnerabilities, serviceLevel and startDate not allowed.
      type: object
      additionalProperties: false
      properties:
        type:
          type: string
          description: >-
            The category of vulnerability applicable to the investor
          example: HEALTH
          enum:
            - HEALTH
            - LIFE_EVENTS
            - RESILIENCE
            - CAPABILITY
        serviceLevel:
          type: string
          description: >-
            The service adjustment or support requirements needed to ensure fair
            and appropriate customer outcomes. These indicators guide how the
            firm should communicate with or support the investor
          example: ARRANGE_WRITTEN_CONFIRMATION_OF_ANY_DISCUSSIONS
          enum:
            - ARRANGE_WRITTEN_CONFIRMATION_OF_ANY_DISCUSSIONS
            - CLIENT_UNABLE_TO_USE_INTERNET
            - EMPATHY_NEEDED_FOR_CUSTOMER
            - ENGLISH_LANGUAGE_SUPPORT_REQUIRED
            - LITERACY_OR_NUMERACY_SUPPORT_NEEDED
            - ONLINE_SUPPORT_NEEDED
            - DO_NOT_OUTBOUND_CALL
            - USE_SIMPLIFIED_LANGUAGE
            - SPEAK_LOUDLY_AND_CLEARLY
            - SPEAK_SLOWLY_FOR_CLIENT
            - NONE_REQUIRED
            - VARIED_CORRESPONDENCE_FORMAT
            - ERROR
        startDate:
          type: string
          description: Vulnerabilities start date (any date). Defaulted to current date if not provided.
          format: date
          example: "2025-01-01"
        expiryDate:
          type: string
          description: Vulnerabilities expiry date (must be after the start date)
          format: date
          example: "2026-01-01"
        adviserId:
          type: string
          maxLength: 14
          readOnly: true
          description: Unique SS&C Hubwise Adviser identifier

  examples:
    400-BadRequest:
      summary: Path parameter does not conform to API schema
      value:
        {
          "errorCode": "HWA-EXCEPTION-001",
          "message": "Validation Error(s) occurred.",
          "errors": [
              {
                  "field": "productId",
                  "resource": "/accounts",
                  "message": "Product Id is mandatory while creating an account."
              }
          ]
        }

  responses:
    401-Unauthorized:
      description: Unauththenticated request
      headers:
        Request-Id:
          $ref: '#/components/headers/Request-Id'
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          examples:
            Ex1:
              summary: Invalid API token
              value:
                {
                   "errorCode": "HWA-EXCEPTION-006",
                    "message": "Authentication process failed.",
                    "errors": [
                        {
                            "field": "Authentication",
                            "resource": "/accounts/HW00013451A/activate",
                            "message": "Authentication token is missing or invalid."
                        }
                    ]
                }
                
    403-Forbidden:
      description: Unorthorised request
      headers:
        Request-Id:
          $ref: '#/components/headers/Request-Id'
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          examples:
            Ex1:
              summary: Requester not allowed access to the resource
              description: Forbidden
              value:
                errorCode: HWA-EXCEPTION-004
                message: You do not have permission to access this resource

    404-NotFound:
      description: The resource was not found
      headers:
        Request-Id:
          $ref: '#/components/headers/Request-Id'
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          examples:
            Ex1:
              summary: Resource not found
              description: NotFound
              value:
                errorCode: HWA-INVESTOR-001
                message: The requested resource could not be found.

    500-ServerError:
      description: Internal server error
      headers:
        Request-Id:
          $ref: '#/components/headers/Request-Id'
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          examples:
            Ex1:
              summary: Unexpected technical error.
              value:
                errorCode: HWA-EXCEPTION-003
                message: |-
                  An unexpected technical error occurred. 


                  Do not retry the call before the time specified in the Retry-After HTTP response header. If no Retry-After header is returned, do not retry the call.

  securitySchemes:
    bearer-token:
      type: http
      scheme: bearer
      bearerFormat: JWT

    x-api-key:
      type: apiKey
      name: x-api-key
      in: header
