  /investors/{investorId}:
    
    get:
      tags:
        - Investors
      summary: Retrieves an investor by ID
      description: 
        Retrieves the details of a specific investor record.


        This endpoint supports the retrieval of Individual, Corporate, and Trust investors using their unique SS&C Wealth Platform Investor ID.
        
        
        The response includes core profile information, contact details, one or more addresses, and one or more territorial profiles, along with type specific attributes relevant to the investor classification.
        
        
        The endpoint must be called once for each investor record to be retrieved.
           
      operationId: retrieveInvestor
      parameters:
        - $ref: '#/components/parameters/Request-Id'
        - name: investorId
          in: path
          description: Unique SS&C Wealth Platform Investor identifier
          required: true
          schema:
            type: string
            maxLength: 14
          example: HWI04003219
      responses:
        "200":
          description: Investor retrieved.
          headers:
            Request-Id:
              $ref: "#/components/headers/Request-Id"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Investor"
              examples:
                Ex1:
                  summary: Investor is an individual
                  value:
                    {
                      "id": "HWI04003219",
                      "adviserId": "E273053",
