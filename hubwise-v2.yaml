    Fee:
      description: Represents a fee against an account.
      required:
        - type
      type: object
      additionalProperties: false
      properties:
        id:
          format: int64
          description: SS&C Hubwise Account Fee identifier
          maximum: 99999
          minimum: 0
          type: integer
          readOnly: true
          example: 1
        accountId:
          description: Unique SS&C Hubwise Account identifier
          maxLength: 11
          minLength: 11
          type: string
          readOnly: true
          example: HW00013451A
        adviserId:
          description: Unique SS&C Hubwise Adviser identifier
          maxLength: 7
          minLength: 7
          type: string
          readOnly: true
          example: E000139
        tenantId:
          description: Unique SS&C Hubwise Tennant identifier
          maxLength: 7
          minLength: 7
          type: string
          readOnly: true
        type:
          description: The fee type
          enum:
            - ADVISER_ANNUAL
            - ADVISER_INITIAL
            - ADVISER_ONE_OFF
            - PORTFOLIO_MANAGEMENT
            - INVESTMENT_SERVICE
            - PRODUCT_ANNUAL
            - PLATFORM_ANNUAL
            - DISCRETIONARY_MANAGEMENT_ANNUAL
            - PLATFORM_INITIAL
          type: string
          example: ADVISER_ANNUAL
        status:
          description: The status of the fee
          enum:
            - ACTIVE
            - COMPLETED
            - ARCHIVED
          type: string
          readOnly: true
        code:
          description: Unique SS&C Hubwise Fee identifier
          maxLength: 6
          minLength: 0
          type: string
          example: AFGVCD
        amount:
          description: The fee amount for a fixed amount based fee
          type: number
        percentage:
          description: The percectage expressed as a decimal for a fixed percentage based fee
          maximum: 1
          exclusiveMaximum: false
          minimum: 0
          exclusiveMinimum: false
          type: number
          example: 0
        currency:
          description: currency of the fee, must match the accounts base currency
          maxLength: 3
          type: string
          example: GBP
        vatIncluded:
          description: If VAT is included in the fee
          type: boolean
          example: true
        startDate:
          format: date
          description: The date the fee starts
          type: string
          example: "2025-04-28"
        endDate:
          format: date
          description: The date the fee ends
          type: string
          example: "2025-05-28"
        method:
          description: The fee method
          default: IN_ADVANCE
          enum:
            - IN_ADVANCE
            - ARREARS
          type: string
          readOnly: true
        invoiceFrequency:
          description: The frequency of invoicing.
          enum:
            - ANNUALLY
            - MONTHLY
            - QUARTERLY
            - HALF_YEARLY
            - ONE_OFF
          type: string
          readOnly: true
        period:
          description: The frequency the fee is charged.
          enum:
            - ANNUALLY
            - MONTHLY
            - QUARTERLY
            - HALF_YEARLY
            - ONE_OFF
          type: string
          readOnly: true
        invoiceMinimumAmount:
          description: The minimum amount the charge can be per invoice
          maximum: 999999999.99
          type: number
          readOnly: true
          example: 123.45
        invoiceMaximumAmount:
          description: The maximum amount the charge can be per invoice
          maximum: 999999999.99
          type: number
          readOnly: true
          example: 9999.99
        bandDetails:
          $ref: "#/components/schemas/TieredFeeDetails"

    TieredFeeDetails:
      description: Detailed configuration for a banded fee structure.
      type: object
      readOnly: true
      additionalProperties: false
      properties:
        type:
          description: The banding method
          enum:
            - TIERED
            - CLIFF_EDGE
          type: string
          readOnly: true
        currency:
          description: currency of the fee, must match the accounts base currency
          maxLength: 3
          type: string
          example: GBP
        minimumAmount:
          description: The minimum amount the charge can be per period.
          maximum: 999999999.99
          type: number
          readOnly: true
          example: 123.45
        maximumAmount:
          description: The maximum amount the charge can be per period.
          maximum: 999999999.99
          type: number
          readOnly: true
          example: 9999.99
        description:
          description: The name of the fee
          maxLength: 35
          minLength: 0
          type: string
          readOnly: true
          example: Adviser Annual Tiered Fee
        bands:
          description: The details of each of the fee rate bands
          type: array
          items:
            $ref: "#/components/schemas/RateBand"
          readOnly: true

    RateBand:
      description: The details of a single rate band within a fee structure.
      type: object
      additionalProperties: false
      properties:
        currency:
          description: currency of the fee, must match the accounts base currency
          maxLength: 3
          type: string
          example: GBP
        amount:
          description: Fee amount for amount based fee
          type: number
        percentage:
          description: Percentage for percentage based fee
          maximum: 100
          exclusiveMaximum: false
          minimum: 0
          exclusiveMinimum: false
          type: number
          example: 0.75
        lower:
          description: The minimum threshold at which this band begins to apply.
          maximum: 999999999.99
          type: number
          readOnly: true
          example: 0
        upper:
          description: the maximum threshold at which this band stops applying.
          maximum: 999999999.99
          type: number
          readOnly: true
          example: 100000
    
