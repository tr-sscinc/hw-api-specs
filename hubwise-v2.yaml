      summary: archive an accounts fee
      description: >-
        
        Archives an existing active fee record for an active investment account.

        This endpoint supports the modification of the end date for an active account fee. The end date can only be set to yesterdays date. To add a new fee the Create fee API will need to be used. 
        
        The end date can only be set for the following fee types:

