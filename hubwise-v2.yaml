      summary: Updates an investor
      description: | 
        Allows the modification of some of the investor details. 
        
        
        Implements [JSON Merge Patch](https://www.rfc-editor.org/rfc/rfc7386) to apply the modification.
      operationId: modifyInvestor
      parameters:
        - $ref: '#/components/parameters/Request-Id'
        - name: investorId
          in: path
          description: Unique SS&C Hubwise Investor identifier
          required: true
          schema:
            type: string
            maxLength: 14
          example: HWI04003219
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvestorPatch"
            examples:
              Ex1:
                summary: Update investor phone number and notifications
                value:
                  {
                    "individual":
                      {
                        "contactDetails":
                          {
