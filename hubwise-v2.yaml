openapi: 3.0.1
info:
  title: SS&C Hubwise API
  version: 0.8.1
  description: API Contract to integrate with SS&C Hubwise
  
servers:
  - url: "https://rest-qd.hubwise.co.uk"
    description: Pilot/UAT environment

tags:
  - name: Investors 
    #description: Enables the management of Hubwise investors, including characteristics of vulnerability.
  - name: Accounts 
    #description: Enables the management of Hubwise investor accounts, including fees, money movements, and transfers.

security:
  - bearer-token: []
  - x-api-key: []

paths:

  /investors:
    
    post:
      tags:
        - Investors
      summary: Create an Investor
      description: >
        Creates a new investor record.


        This endpoint supports the creation of Individual, Corporate, and Trust investors. The required data varies depending on the investor type and includes core profile information, contact details, one or more addresses, and one or more territorial profiles.
        
        
        This endpoint should be used when creating new investor records. An investor can have a maximum of 10 addresses, 5 nationalities, and 5 tax residencies.
        
        
        The SS&C Hubwise Investor ID returned in the response payload uniquely identifies the investor and must be used for all subsequent investor maintenance and account creation operations.
        
        
        The endpoint must be called once for each investor record to be created.
      operationId: createInvestor
      parameters:
        - $ref: '#/components/parameters/Request-Id'
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Investor"
            examples:
              Ex1:
                summary: Investor is an individual
                value:
                  {
                    "adviserId": "E273053",
                    "type": "INDIVIDUAL",
                    "externalReferences":
                      [
                        {
                          "reference": "d8d3a6b1-f1e5-4b0a-8d2c-0a3f5b7e9d1c",
                          "provider": "CRM Name"
                        }
                      ],
                    "individual":
                      {
                        "title": "OTHER",
                        "titleOtherValue": "General",
                        "firstName": "Sam",
                        "middleName": "John",
                        "surname": "Smith",
                        "dateOfBirth": "2000-02-20",
                        "gender": "MALE",
                        "maritalStatus": "MARRIED",
                        "incomeAndInvestment":
