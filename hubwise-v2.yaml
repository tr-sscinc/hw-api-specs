  /accounts/{accountId}/third-parties:

    post:
      tags:
        - Accounts
      summary: Create Third Parties on an account
      description: >-
        Allows you to add third parties linked to a SS&C Wealth Platform Investment Account. A third party refers to a company, trust, or individual connected to the account who is not an investor.

        
        Three types of third parties are supported:
        
         - Beneficiaries - only use this operation if no beneficiaries already exist on the account; otherwise, use the Replace Beneficiaries operation instead
         
         - Power of Attorney - can be used to add the first or additional entries
         
         - Employers - only use this endpoint if no employer is already linked as only one employer third-party is permitted per account
         
        
        A single request can contain multiple third parties of different types, provided they all relate to the same investment account.
        
        
        An investment account must already exist before adding third parties, and the Investment Account ID must be provided as a required path parameter.
      operationId: createThirdParties
      parameters:
        - $ref: '#/components/parameters/Request-Id'
        - name: accountId
          in: path
          description: Unique SS&C Wealth Platform Account identifier
          required: true
          schema:
