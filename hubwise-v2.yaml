          enum:
            - LEAVE_IN_CASH
            - INVEST_IN_MODEL
          type: string
          example: INVEST_IN_MODEL
        
        value:
          $ref: "#/components/schemas/IllustrationValue"
        
        fee:
          $ref: "#/components/schemas/IllustrationMovementFee"  
    
    IllustrationNPAccountFee:
      description: Account level fees not associated with a specific money movement or transfer.
      additionalProperties: false
      properties:
        id:
          type: integer
          format: int64
          description: Unique SS&C Wealth Platform Fee identifier.
          example: 1
        type:
          type: string
          description: The type of fee.
          enum:
            - ADVISER_ANNUAL
            - ADVISER_INITIAL
            - ADVISER_ONE_OFF
            - PORTFOLIO_MANAGEMENT
            - INVESTMENT_SERVICE
            - DISCRETIONARY_MANAGEMENT_ANNUAL
          example: ADVISER_ANNUAL
        code:
          type: string
          description: Unique identifier for a pre-configured set of tiered rates.
          maxLength: 6
          
          example: AFGVCD
        amount:
          type: number
          description: Amount-based fee value.
          example: 1000
        percentage:
          type: number
          description: The rate for a percentage-based fee.
          example: 0.12
        currency:
          type: string
          description: The currency associated with the fee.
          example: GBP
        vatIncluded:
          type: boolean
          description: Whether the fee includes VAT.
          example: true
        startDate:
          type: string
          description: The intended start date of the fee.
          format: date
          example: "2025-04-28"
        endDate:
          type: string
          description: The date when the fee is scheduled to stop.
          format: date
          example: "2027-04-28"
        bandAdjustmentAmount:
          description: If the account is in a fee group for this fee type, the total value of the other accounts in the group.
          type: number
          example: 1000

    IllustrationNPAccountTransfer:
      description: Transfers into the account from an external provider
      type: object
      additionalProperties: false
      properties:
        
        investmentInstruction:
          type: string
          description: Whether a transfer should be invested immediately or held as cash.
          enum:
            - INVEST_IN_MODEL
            - LEAVE_IN_CASH
          example: INVEST_IN_MODEL
        value:
          $ref: "#/components/schemas/IllustrationValue"
        fee:
          $ref: "#/components/schemas/IllustrationTransferFee"    
              

    IllustrationNPRequest:
      type: object
      additionalProperties: false
      properties:
        accountId:
           type: string
           nullable: true
           example: "ACC123456"
           description: Unique SS&C Wealth Platform Account identifier

        investors:
              type: array
              description: |
                The investor(s) associated with the illustration.
              items:
                type: object
                properties:
                  name:
                    type: string
                    example: "Anne Winfield"
                    description: The investor’s name.
                  dateOfBirth:
                    type: string
                    format: date
                    example: "2000-10-10"
                    description: The investor’s date of birth. 
        
          
        illustrationDetails:
          type: object
          description: Required when creating a new illustration without an account ID, or when illustrating proposed changes to an existing account.
          properties:

            forecastPeriod:
              type: integer
              example: 15
              description: Number of years that the illustration will cover. If not provided, the default 10 year period will be used.

            account:
              type: object
              description: |
                    Account details for the illustration.
                    
              properties:
                productId:
                  description: Unique SS&C Wealth Platform Product identifier.
                  type: string
                  example: GIA
                currency:
                  description: The currency associated with the account.
                  type: string
                  example: GBP

            model:
              $ref: '#/components/schemas/IllustrationModel'
 
            moneyMovements:
              type: array
              items:
                allOf:
                  - $ref: "#/components/schemas/IllustrationNPAccountMovement"
                description: Contributions and Withdrawals.
            
            fees:
              type: array
              items:
                allOf:
                  - $ref: "#/components/schemas/IllustrationNPAccountFee"
                description: Account level fees not associated with a specific money movement or transfer.

            transfers:
              type: array
              items:
                allOf:
                  - $ref: "#/components/schemas/IllustrationNPAccountTransfer"
                description: Transfers into the account from an external provider


    IllustrationNPResponse:
      type: object
      additionalProperties: false
      properties:
        message:
          type: object
          properties:
            result:
              type: object
              properties:
                illustrationResults:
                  type: array
                  items:
                    $ref: '#/components/schemas/IllustrationResult'

            document:
              $ref: '#/components/schemas/IllustrationDocument'  
    
    IllustrationResult:
      type: object
      additionalProperties: false
      properties:
        projectionType:
          type: string
          description: Indicates whether the illustration class is new or existing.
          enum:
            - NEW
            - EXISTING
          example: NEW
          x-enum-descriptions:
            - New
            - Existing

        summary:
          type: array
          items:
            $ref: '#/components/schemas/IllustrationSummary'

        reductionInYield:
          type: array
          items:
            $ref: '#/components/schemas/IllustrationReductionInYield'

        deductions:
          type: array
          items:
            $ref: '#/components/schemas/IllustrationDeduction'

        adviserFees:
          type: array
          items:
            $ref: '#/components/schemas/IllustratioAdviserFee'

    IllustrationSummary:
      type: object
      additionalProperties: false
      properties:
        assumptionLevel:
          type: string
          enum:
            - LOW
            - MEDIUM
            - HIGH
          example: MEDIUM
          x-enum-descriptions:
            - Low
            - Medium
            - High

        periodStartDate:
          type: string
          format: date
          example: "2026-01-01"

        periodEndDate:
          type: string
          format: date
          example: "2026-12-31"

        openingFundValue:
          type: number
          format: double
          example: 10000

        newFundInvestment:
          type: number
          format: double
          example: 500

        totalIncome:
          type: number
          format: double
          example: 200

        totalIncomeToDate:
          type: number
          format: double
          example: 200

        closingFundValue:
          type: number
          format: double
          example: 10700

    IllustrationReductionInYield:
      type: object
      additionalProperties: false
      properties:
        assumptionLevel:
          type: string
          enum:
            - MEDIUM
          example: MEDIUM
          x-enum-descriptions:
            - Medium

        growthRatePercentage:
          type: number
          format: double
          example: 5.0

        reductionInYieldPercentage:
          type: number
          format: double
          example: 1.2

    IllustrationDeduction:
      type: object
      additionalProperties: false
      properties:
        assumptionLevel:
          type: string
          enum:
            - MEDIUM
          example: MEDIUM
          x-enum-descriptions:
            - Medium

        date:
          type: string
          format: date
          example: "2026-12-31"

        year:
          type: integer
          example: 1

        isProjectionEnd:
          type: boolean
          example: false

        inflowToDate:
          type: number
          format: double
          example: 1000

        outflowToDate:
          type: number
          format: double
          example: 200

        actualDeductionsToDate:
          type: number
          format: double
          example: 150

        effectOfDeductionsToDate:
          type: number
          format: double
          example: 75

        yearEndValue:
          type: number
          format: double
          example: 12000

        yearEndValueWithoutCharges:
          type: number
          format: double
          example: 12300

        yearEndValueAfterProductCharges:
          type: number
          format: double
          example: 11900

    IllustratioAdviserFee:
      type: object
      additionalProperties: false
      properties:
        assumptionLevel:
          type: string
          enum:
            - MEDIUM
          example: MEDIUM
          x-enum-descriptions:
            - Medium

        date:
          type: string
          format: date
          example: "2026-12-31"

        year:
          type: integer
          example: 1

        isProjectionEnd:
          type: boolean
          example: false

        initialAdviserFees:
          type: number
          format: double
          example: 250

        ongoingAdviserFees:
          type: number
          format: double
          example: 100

    IllustrationDocument:
      type: object
      additionalProperties: false
      properties:
        pdfData:
          type: string
          format: byte
          description: Base64 encoded PDF document.

        totalPages:
          type: integer
          example: 12

    IllustrationModel:
      type: object
      description: >
        Investment Strategy for the account.
      properties:
        id:
          description: Unique SS&C Wealth Platform Model identifier.
          type: string
          example: HW000000090

        providerId:
          description: Unique SS&C Wealth Platform tenant ID for the model owner. If not provided the tenantId from the token will be used.
          type: string
          example: HUBWISE

        date:
          description: The model version date. If not provided, the most recent version will be used.
          type: string
          format: date
          example: '2026-04-28'

        allocations: 
          description: Individual asset selection.
          type: array
          items:
            $ref: '#/components/schemas/IllustrationAllocation'

    IllustrationAllocation:
      type: object
      description: Asset allocation within the model.
      properties:
        isin:
          type: string
          description: Must be a valid 12-character ISIN code identifying the asset to which the allocation applies.
          example: GB0005405286

        currency:
          type: string
          description: Market currency.
          enum:
            - USD
            - GBP
            - EUR
          example: GBP

        exchange:
          type: string
          description: Exchange code.
          example: XLON

        percentage:
          type: number
          format: double
          description: The percentage of any investment to be allocated to this asset.
          example: 100

    IllustrationMovementFee:
      allOf:
        - $ref: '#/components/schemas/IllustrationTransferFee'
        - type: object
          properties:
            instalmentPlan:
              $ref: "#/components/schemas/IllustrationFeeInstalmentPlan"

    IllustrationTransferFee:
      description: A fee associated with this money movement or transfer.
      type: object
      properties:
        amount:
          description: Amount-based fee value.
          type: number
          example: 5
        percentage:
          description: The rate for a percentage-based fee.
          maximum: 100
          exclusiveMaximum: false
          minimum: 0
          exclusiveMinimum: false
          type: number
          example: 5

    IllustrationFeeInstalmentPlan:
      description: >-
        A monthly instalment plan that spreads a fee across multiple regular money movements.
      type: object
      additionalProperties: false
      properties:
        totalMonths:
          format: int64
          description: The total number of instalments across which the fee will be spread.
          maximum: 999
          type: integer
          example: 12

    IllustrationValue:
      required:
        - amount
        - currency
      type: object
      additionalProperties: false
      properties:
        amount:
          format: double
          description: Monetary value of the movement or transfer.
          type: number
          example: 15000
        currency:
          description: The currency associated with the money movement or transfer.
          maxLength: 3
          type: string
          example: GBP

  examples:
    
    400-BadRequest:
      summary: Path parameter does not conform to API schema
      value:
        {
          "errorCode": "HWA-EXCEPTION-001",
          "message": "Validation Error(s) occurred.",
          "errors": [
              {
                  "field": "productId",
                  "resource": "/accounts",
                  "message": "Product Id is mandatory while creating an account."
              }
          ]
        }

    400-MissingBodyProperty:
      summary: Request body is missing a required property
      value:
        title: Invalid Request
        detail: The request is missing an expected body property.
        errors:
          - detail: The body property {name} is required.
            pointer: "/name"

    400-MissingQueryParameter:
      summary: Request is missing an expected query parameter
      value:
        title: Invalid Request
        detail: The request is missing an expected query parameter.
        errors:
          - detail: The query parameter {name} is required.
            parameter: name

    400-MissingRequestHeader:
      summary: Request is missing an expected HTTP request header
      value:
        title: Invalid Request
        detail: The request is missing an expected HTTP request header.
        errors:
          - detail: The header {Accept} is required
            header: Accept

    400-InvalidQueryParam:
      summary: Request contains a malformed query parameter
      value:
        title: Invalid Request
        detail: The request contains a malformed query parameter.
        errors:
          - detail: The expected string values are ASC or DSC
            parameter: sort

    400-InvalidRequestHeader:
      summary: Request contains a malformed request header
      value:
        title: Invalid Request
        detail: The request contains a malformed request header parameter.
        errors:
          - detail: The request header was malformed
            header: Accept            

    400-InvalidBodyPropertyValue:
      summary: Request contains an invalid body property value
      value:
        title: Invalid Request
        detail: The request body contains an invalid body property value.
        errors:
          - detail: A value `Never` is an invalid. Please provide `monthly` or `quarterly`
            pointer: "/marketingCommunication/frequency"
          - detail: Must be a positive integer
            pointer: "/quantity"

    403-Forbidden:
      summary: Access is forbidden
      value:
        title: Forbidden
        detail: The action could not be completed
        
    404-NotFound:
      summary: Resource not found
      value:
        title: Not found
        detail: The requested resource was not found       
            
    400-AlreadyExists:
      summary: Resource already exists
      value:
        title: Already exists
        detail: The resource being created already exists.
          
    400-BusinessRules:
      summary: Business rule violation
      value: 
        title: Multiple business rule violations
        detail: The request body is invalid and not meeting business rules.
        errors:
          - detail: Cannot withdraw all income from a SIPP account
            pointer: "/incomeOption/type"
          - detail: Bank account currency must match the base currency of the investment account
            pointer: "/currency"
          - detail: Account holder with ID HWI00052961 does not exist
            pointer: "/holders/1/id"
            
    500-serverError:
      summary: Server error
      value:
        title: Internal Server Error
        status: 500
        detail: HWA-EXCEPTION-003 - An unexpected technical error occurred. Do not retry the call before the time specified in the Retry-After HTTP response header. If no Retry-After response header is returned, do not retry the call.

  responses:
    
    400-BadRequest:
      description: |
        The request was malformed or could not be processed. 

        Examples of `Bad Request` problem detail responses:

         - Missing or invalid request header parameter
         - Missing or invalid query parameter         
         - Missing or invalid request body property
      headers:
        Request-Id:
          $ref: '#/components/headers/Request-Id'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
          examples:
            400-MissingBodyProperty:
              $ref: '#/components/examples/400-MissingBodyProperty'
            400-InvalidBodyPropertyValue:
              $ref: '#/components/examples/400-InvalidBodyPropertyValue'
            400-MissingQueryParameter:
              $ref: '#/components/examples/400-MissingQueryParameter'
            400-MissingRequestHeader:
              $ref: '#/components/examples/400-MissingRequestHeader'
            400-InvalidQueryParam:
              $ref: '#/components/examples/400-InvalidQueryParam'
            400-InvalidRequestHeader:
              $ref: '#/components/examples/400-InvalidRequestHeader'
            400-BusinessRules:
              $ref: '#/components/examples/400-BusinessRules'
            400-AlreadyExists:
              $ref: '#/components/examples/400-AlreadyExists'
    
    400-BadRequest-NoBody:
      description: |
        The request had one of the following issues:

         - Missing or invalid path parameter
         - Missing or invalid query parameter
         - Missing or invalid request header 

      headers:
        Request-Id:
          $ref: '#/components/headers/Request-Id'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
          examples:
            400-MissingQueryParameter:
              $ref: '#/components/examples/400-MissingQueryParameter'
            400-MissingRequestHeader:
              $ref: '#/components/examples/400-MissingRequestHeader'
            400-InvalidQueryParam:
              $ref: '#/components/examples/400-InvalidQueryParam'
            400-InvalidRequestHeader:
              $ref: '#/components/examples/400-InvalidRequestHeader'
    
    401-Unauthorized:
      description: Unauthenticated request
      headers:
        Request-Id:
          $ref: '#/components/headers/Request-Id'
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
          examples:
            Ex1:
              summary: Invalid API token
              value:
                {
                    "detail": "Authentication process failed."
                }
                
    403-Forbidden:
      description: Unauthorized request
      headers:
        Request-Id:
          $ref: '#/components/headers/Request-Id'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
          examples:
            403-Forbidden:
              $ref: '#/components/examples/403-Forbidden'

    404-NotFound:
      description: The resource was not found
      headers:
        Request-Id:
          $ref: '#/components/headers/Request-Id'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
          examples:
            404-NotFound:
              $ref: '#/components/examples/404-NotFound'

    500-ServerError:
      description: Internal server error
      headers:
        Request-Id:
          $ref: '#/components/headers/Request-Id'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
          examples:
            500-serverError:
              $ref: '#/components/examples/500-serverError'

  securitySchemes:
    bearer-token:
      type: http
      scheme: bearer
      bearerFormat: JWT