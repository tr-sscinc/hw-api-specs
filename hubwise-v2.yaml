    ExecutedTradeDetails:
      description: Details of an executed trade provided by the customer
      required:
        - priceExecuted
        - exchangeRate
        - counterParty
        - tradeTime
        - marketConsideration
        - stampValue
        - commission
        - charges
        - settlementDate
        - orderType
      type: object
      additionalProperties: false
      properties:
        priceExecuted:
          type: number
          description: The price at which the trade was executed
          example: 10.123456
        exchangeRate:
          type: number
          description: The exchange rate applied at time of execution
          example: 1.000000
        counterParty:
          type: string
          description: The identifier of the counterparty the trade was executed with
          maxLength: 10
          example: BARCLAYS01
        tradeTime:
          type: string
          description: The time the trade was executed in HHmmss format
          maxLength: 6
          minLength: 6
          example: "143025"
        marketConsideration:
          type: number
          description: The total market consideration value of the trade
          example: 12659.380000
        stampValue:
          type: number
