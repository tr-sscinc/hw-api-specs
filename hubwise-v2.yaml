  /accounts/{accountId}/bank-accounts:
    
    post:
      tags:
        - Accounts
      summary: Create a bank account
      description: |
        Creates a new bank account and associates it with an existing investment account.


        This endpoint creates GBP and non GBP retail and business bank details. The bank details  are linked to a specified SS&C Hubwise Account ID and SS&C Hubwise Investor ID(s) or SS&C Hubwise Third Party ID(s) and validated.


        The investment account must exist before a bank account can be created and associated with it.

