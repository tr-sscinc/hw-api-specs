                summary: Add a banded annual adviser fee to the account.
                value: 
                  {
                    "fees": [
                      {
                        "type": "ADVISER_ANNUAL",
                        "code": "AFGVCD",
                        "vatIncluded": true,
                        "startDate": "2025-04-28"
