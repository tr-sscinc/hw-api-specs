  /accounts/{accountId}/portfolio-adjustments:
    
    post:
      tags:
        - Accounts
      summary: Create portfolio adjustments
      description: >-
        This endpoint is used to adjust portfolio holdings.

        Two adjustment types are supported:

          - Rebalancing restores a portfolio to its original target allocation after market movements have caused it to drift away from that mix.

          - Switching changes the investment strategy 

        A request message must include a single instruction to either rebalance an investment account or to change the investment strategy for that account.  Switch instructions must also include details of the new model portfolio.


        An investment account must already exist before a portfolio adjustment can be instructed, and the Investment Account ID must be provided as a required path parameter.
      operationId: createPortfolioAdjustments
      parameters:
        - $ref: '#/components/parameters/Request-Id'
        - name: accountId
          in: path
          description: Unique SS&C Wealth Platform Account identifier
          required: true
          schema:
            type: string
            minLength: 11
            maxLength: 11
          example: HW00013451A
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PortfolioAdjustment"
            examples:
              Ex1:
                summary: Rebalance portfolio allocations 
                value: 
                  {
                    "type": "REBALANCE",
                    "declarations": [
                      {
                        "adviserId": "E273053",
                        "templateId": "AMENDMENT_CONSENT",
                        "acknowledgement": true
                      }
                    ]
                  } 
              Ex2:
                summary: Switch to a new Model
                value:
                  {
                    "type": "SWITCH",
                    "model": {
                        "id": "DF000000001",
                        "providerId": "DFM0001",
                        "date": "2026-01-01"
                      },
                    "declarations": [
                      {
                        "adviserId": "E273053",
                        "templateId": "AMENDMENT_CONSENT",
                        "acknowledgement": true
                      }
                    ]
                  }
      responses:
        "201":
          description: Portfolio adjustment created successfully.
          headers:
            Request-Id:
              $ref: '#/components/headers/Request-Id'
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortfolioAdjustment"
              examples:
                Ex1:
                  summary: Rebalance portfolio allocations 
                  value: 
                    {
                      "id": "00000153931",
                      "accountId": "HW04121191A",
                      "tenantId": "HUBWISE",
                      "type": "REBALANCE"
                    }
                Ex2:
                  summary: Switch to a new Model
                  value:
                    {
                      "id": "00000153932",
                      "accountId": "HW04003258A",
                      "tenantId": "HUBWISE",
                      "type": "SWITCH",
                      "model": {
                          "id": "DF000000001",
                          "providerId": "DFM0001",
                          "date": "2026-01-01"
