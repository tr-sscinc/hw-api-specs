  /investors/{investorId}/vulnerabilities:
    
    post:
      tags:
        - Investors
      summary: Create an investor's vulnerabilities
      description: >
        Creates one or more characteristics of vulnerability records for an existing investor.


        This endpoint applies only to investors of type Individual or Court Appointed Deputy and requires the SS&C Wealth Platform Investor ID generated during investor creation.


        This endpoint should be used when creating new vulnerability records against an existing investor. Each record must include the vulnerability characteristic and its associated service level. If a start date is not provided, it will default to the current date.


        If vulnerability characteristics already exist for the investor, the update endpoint must be used.


        The endpoint must be called once per investor record.

      operationId: createInvestorVulnerabilities
      parameters:
        - $ref: '#/components/parameters/Request-Id'
        - name: investorId
          in: path
          description: Unique SS&C Wealth Platform Investor identifier
          required: true
          schema:
            type: string
            maxLength: 11
          example: HWI04003219
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VulnerabilityHeader"
            examples:
              Ex1:
                summary: Characteristics of a vulnerable investor
                value:
                  {
                    "vulnerabilities":
                      [
                        {
                          "type": "HEALTH",
                          "serviceLevel": "SPEAK_LOUDLY_AND_CLEARLY",
                          "startDate": "2025-10-01",
                          "expiryDate": "2025-10-22"
                        },
                        {
                          "type": "HEALTH",
                          "serviceLevel": "SPEAK_SLOWLY_FOR_CLIENT"
                        }
                      ],
                    "declarations":
                      [
                        {
                          "adviserId": "E273053",
                          "templateId": "CONFIRM_VULNERABILITY_CONSENT",
                          "acknowledgement": true
                        }
                      ]
                  }
        required: true
      responses:
        "201":
          description: Investor vulnerabilities created successfully.
          headers:
            Request-Id:
              $ref: "#/components/headers/Request-Id"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VulnerabilityHeader"
              examples:
                Ex1:
                  summary: Characteristics of a vulnerable investor
                  value:
                    {
                      "investorId": "HWI00016530",
                      "tenantId": "HUBWISE",
                      "vulnerabilities":
                        [
                          {
                            "type": "HEALTH",
                            "serviceLevel": "SPEAK_LOUDLY_AND_CLEARLY",
                            "startDate": "2025-10-01",
                            "expiryDate": "2025-10-22",
                            "adviserId": "E273053"
                          },
                          {
                            "type": "HEALTH",
                            "serviceLevel": "SPEAK_SLOWLY_FOR_CLIENT",
                            "startDate": "2025-10-22",
                            "adviserId": "E273053"
                          },
                        ]
                    }
        "400":
          $ref: "#/components/responses/400-BadRequest"
        "401":
          $ref: "#/components/responses/401-Unauthorized"
        "403":
          $ref: "#/components/responses/403-Forbidden"
        "404":
          $ref: "#/components/responses/404-NotFound"
        "500":
          $ref: "#/components/responses/500-ServerError"

    get:
      tags:
        - Investors
      summary: Retrieves an investor's vulnerable Characteristics
      description: 
        Retrieves the characteristics of vulnerabilities for a specific investor record.


        This endpoint supports the retrieval of one or more characteristics of vulnerabilities for Individual and Court Appointed Deputy investors using their unique SS&C Wealth Platform Investor ID.
        
        
        The response includes the investors characteristics of vulnerabilities, along with the associated service level, start date, and expiry date. All vulnerabilities associated with the investor will be returned, regardless of their start date or expiry date.
        

        The endpoint must be called once for each investor record to be retrieved.  If the investor exists but has no characteristics of vulnerabilities, a valid response with empty collections will be returned.
       
      operationId: retrieveInvestorVulnerabilities
      parameters:
        - $ref: '#/components/parameters/Request-Id'
        - name: investorId
          in: path
          description: Unique SS&C Wealth Platform Investor identifier
          required: true
          schema:
            type: string
            maxLength: 11
          example: HWI04003219
      responses:
        "200":
          description: Investor vulnerabilities retrieved successfully.
          headers:
            Request-Id:
              $ref: "#/components/headers/Request-Id"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VulnerabilityHeader"
              examples:
                Ex1:
                  summary: Characteristics of a vulnerable investor
                  value:
                    {
                      "investorId": "HWI00016530",
                      "tenantId": "HUBWISE",
                      "vulnerabilities":
                        [
                          {
                            "type": "HEALTH",
                            "serviceLevel": "SPEAK_LOUDLY_AND_CLEARLY",
                            "startDate": "2025-10-01",
                            "expiryDate": "2025-10-22",
                            "adviserId": "E273053"
                          },
                          {
                            "type": "HEALTH",
                            "serviceLevel": "SPEAK_SLOWLY_FOR_CLIENT",
                            "startDate": "2025-10-22",
                            "adviserId": "E273053"
                          }
                        ]
                    }
                Ex2:
                  summary: No vulnerable characteristics exist
                  value:
                    {
                      "investorId": "HWI00016530",
                      "tenantId": "HUBWISE",
                      "vulnerabilities": []
                    }
