        percentage:
          description: The percectage expressed as a decimal for a fixed percentage based fee
          maximum: 1
          exclusiveMaximum: false
          minimum: 0
          exclusiveMinimum: false
          type: number
          example: 0
        currency:
          description: currency of the fee, must match the accounts base currency
          maxLength: 3
          type: string
          example: GBP
        vatIncluded:
          description: If VAT is included in the fee
          type: boolean
          example: true
        startDate:
          format: date
          description: The date the fee starts
          type: string
          example: "2025-04-28"
        endDate:
          format: date
          description: The date the fee ends
          type: string
          example: "2025-05-28"
        method:
          description: The fee method
          default: IN_ADVANCE
          enum:
            - IN_ADVANCE
            - ARREARS
          type: string
          readOnly: true
        invoiceFrequency:
          description: The frequency of invoicing.
          enum:
            - ANNUALLY
            - MONTHLY
            - QUARTERLY
            - HALF_YEARLY
            - ONE_OFF
          type: string
          readOnly: true
        period:
          description: The frequency the fee is charged.
          enum:
            - ANNUALLY
            - MONTHLY
            - QUARTERLY
            - HALF_YEARLY
            - ONE_OFF
          type: string
          readOnly: true
        invoiceMinimumAmount:
          description: The minimum amount the charge can be per invoice
          maximum: 999999999.99
          type: number
          readOnly: true
          example: 123.45
        invoiceMaximumAmount:
          description: The maximum amount the charge can be per invoice
          maximum: 999999999.99
          type: number
          readOnly: true
          example: 9999.99
        bandDetails:
          $ref: "#/components/schemas/TieredFeeDetails"

    TieredFeeDetails:
      description: Detailed configuration for a banded fee structure.
      type: object
      readOnly: true
      additionalProperties: false
      properties:
        type:
          description: The banding method
          enum:
            - TIERED
            - CLIFF_EDGE
          type: string
          readOnly: true
        currency:
          description: currency of the fee, must match the accounts base currency
          maxLength: 3
          type: string
          example: GBP
        minimumAmount:
          description: The minimum amount the charge can be per period.
          maximum: 999999999.99
          type: number
          readOnly: true
          example: 123.45
        maximumAmount:
          description: The maximum amount the charge can be per period.
          maximum: 999999999.99
          type: number
          readOnly: true
          example: 9999.99
        description:
          description: The name of the fee
          maxLength: 35
          type: string
          readOnly: true
          example: Adviser Annual Tiered Fee
        bands:
          description: The details of each of the fee rate bands
          type: array
          items:
            $ref: "#/components/schemas/RateBand"
          readOnly: true

    RateBand:
      description: The details of a single rate band within a fee structure.
      type: object
      additionalProperties: false
      properties:
        currency:
          description: currency of the fee, must match the accounts base currency
          maxLength: 3
          type: string
          example: GBP
        amount:
          description: Fee amount for amount based fee
          type: number
        percentage:
          description: Percentage for percentage based fee
          maximum: 100
          exclusiveMaximum: false
          minimum: 0
          exclusiveMinimum: false
          type: number
          example: 0.75
        lower:
          description: The minimum threshold at which this band begins to apply.
          maximum: 999999999.99
          type: number
          readOnly: true
          example: 0
        upper:
          description: the maximum threshold at which this band stops applying.
          maximum: 999999999.99
          type: number
          readOnly: true
          example: 100000
    
    FeesHeaderPatch:
      required:
        - fees
      type: object
      additionalProperties: false
      properties:
        fees:
          type: array
          items:
            $ref: "#/components/schemas/FeePatch"
        declarations:
          writeOnly: true
          type: array
          items:
            $ref: "#/components/schemas/Declaration"

    FeePatch:
      description: Represents a fee being archived against an account.
      required:
        - endDate
      type: object
      additionalProperties: false
      properties:
        endDate:
          format: date
          description: The date the fee ends
          type: string
          example: "2025-05-28"

    MovementsHeader:
      required:
        - moneyMovements
      type: object
      additionalProperties: false
      properties:
        moneyMovements:
          type: array
          items:
            $ref: "#/components/schemas/Movement"
        declarations:
          writeOnly: true
          type: array
          items:
            $ref: "#/components/schemas/Declaration"
      
    MovementsHeaderPatch:
      required:
        - moneyMovements
      type: object
      additionalProperties: false
      properties:
        moneyMovements:
          type: array
          items:
            $ref: "#/components/schemas/MovementPatch"
        declarations:
          writeOnly: true
          type: array
          items:
            $ref: "#/components/schemas/Declaration"

    Movement:
      description: money movements in and out of an account
      required:
        - type
        - frequency
        - bank
        - payer
      type: object
      additionalProperties: false
      properties:
        id:
          format: int64
          description: SS&C Wealth Platform Movement identifier
          type: integer
          readOnly: true
          example: 2
        accountId:
          format: string
          description: Unique SS&C Wealth Platform Account identifier
          maxLength: 11
          minLength: 11
          type: string
          readOnly: true
          example: HW00013451A
        tenantId:
          format: string
          description: Unique SS&C Wealth Platform Tenant identifier
          maxLength: 7
          minLength: 7
          type: string
          readOnly: true
          example: HUBWISE
        adviserId:
          format: string
          description: Unique SS&C Wealth Platform Adviser identifier
          maxLength: 7
          minLength: 7
          readOnly: true
          type: string
          example: E273053
        status:
          description: The status of the movement
          enum:
            - ACTIVE
            - NEW
            - COMPLETED
            - PENDING
            - ARCHIVED
          type: string
          readOnly: true
          example: ACTIVE
        type:
          description: >-
            The type of money movement being specified, the API can support payments into and out
            of the account. Withdrawals are only valid for non pension products. UFPLS,
            FLEXI_ACCESS_INCOME, FLEXI_ACCESS_PCLS are only valid for pension products.
          enum:
            - CONTRIBUTIONS
            - WITHDRAWALS
            - UFPLS
            - FLEXI_ACCESS_INCOME
            - FLEXI_ACCESS_PCLS
          type: string
          example: CONTRIBUTIONS
        contributionMethod:
          description: >-
            The chosen payment method for the contribution money movement. This is mandatory if
            type is contribution.
          enum:
            - ELECTRONIC
            - CHEQUE
            - DIRECT_DEBIT
          type: string
          example: ELECTRONIC
        payer:
          description: >-
            Whether the payment is being made by the individual owner(s) of the account or an
            employer on their behalf. Employer contributions are only applicable to pension
            products. Defaulted to SELF if not provided.
          enum:
            - SELF
            - EMPLOYER
          type: string
          example: SELF
        frequency:
          description: >-
            The frequency of this specific money movement. One Off Direct Debit contributions are
            not supported. Single Withdrawals are not supported at onboarding, but can be added
            once the account is active.
          enum:
            - ANNUALLY
            - MONTHLY
            - QUARTERLY
            - HALF_YEARLY
            - ONE_OFF
          type: string
          example: ONE_OFF
        nextDate:
          format: date
          description: >-
            The initial date or next date for the money movement. 
          type: string
          example: "2025-01-22"
        endDate:
          format: date
          description: >-
            The date on which the movement is intended to cease, this would be used, for example,
            for regular withdrawals or drawdown arrangements.
          type: string
        reference:
          description: >-
            A reference which can  be provided, if not provided it will be generated for a Direct
            Debit
          type: string
          maxLength: 14
          example: HW000134514
        isMaximum:
          description: >-
            Indicates if the maximum allowable amount. Can only be used for WITHDRAWAL, UFPLS,
            FLEXI_ACCESS_INCOME, FLEXI_ACCESS_PCLS.
          type: boolean
        includeNonDailyAssets:
          description: >-
            Allows a customer to indicate if they want to include or exclude non-daily traded assets from one off contributions and withdrawals. Defaults to false for one off contributions and true for one off withdrawals.
          type: boolean
        investmentInstruction:
          description: >-
            The choice of whether to invest immediately into a model or hold in cash for a
            contribution.
          enum:
            - LEAVE_IN_CASH
            - INVEST_IN_MODEL
          type: string
          example: INVEST_IN_MODEL
        thirdPartyId:
          description: SS&C Wealth Platform third party identifier
          maxLength: 2
          minLength: 1
          type: string
          example: "1"
        value:
          $ref: "#/components/schemas/Value"
        bank:
          $ref: "#/components/schemas/BankAccountDetails"
        fee:
          $ref: "#/components/schemas/MovementFee"
        hrmcProtection:
          $ref: "#/components/schemas/HMRCProtection"
        sourceOfFunds:
          $ref: "#/components/schemas/SourceOfFunding"

    MovementPatch:
      description: patch regular money movements in and out of an account
      type: object
      additionalProperties: false
      properties:
        frequency:
          description: >-
            The frequency of this specific money movement. One Off Direct Debit contributions are
            not supported. Single Withdrawals are not supported at onboarding, but can be added
            once the account is active.
          enum:
            - ANNUALLY
            - MONTHLY
            - QUARTERLY
            - HALF_YEARLY
            - ONE_OFF
          type: string
          example: ONE_OFF
        startDate:
          format: date
          description: >-
            The intended start date of the money movement. The available dates will depend on the
            type of movement and the contribution method.
          type: string
          example: "2025-01-22"
        endDate:
          format: date
          description: >-
            The date on which the movement is intended to cease, this would be used, for example,
            for regular withdrawals or drawdown arrangements.
          type: string
        value:
          $ref: "#/components/schemas/ValuePatch"
        bank:
          $ref: "#/components/schemas/BankAccountDetails"
        fee:
          $ref: "#/components/schemas/MovementFee"

    Value:
      description: >-
        Value object representing amounts and currency. This is mandatory for money movements unless
        isMaximum is true and type is WITHDRAWAL, UFPLS, FLEXI_ACCESS_INCOME, FLEXI_ACCESS_PCLS
      required:
        - amount
        - currency
      type: object
      additionalProperties: false
      properties:
        amount:
          format: double
          description: Value of the money movement or transfer
          type: number
          example: 15000
        currency:
          description: currency of the money movement or transfer, must match the accounts base currency
          maxLength: 3
          type: string
          example: GBP
        crystallised:
          description: Crystallised value being transferred
          type: number
        uncrystallised:
          description: Uncrystallised value being transferred
          type: number
          readOnly: true
    
    ValuePatch:
      description: >-
        Value object representing amounts.
      required:
        - amount
      type: object
      additionalProperties: false
      properties:
        amount:
          format: double
          description: Value of the money movement or transfer
          type: number
          example: 15000

    MovementFee:
      allOf:
        - $ref: '#/components/schemas/TransferFee'
        - type: object
          properties:
            instalmentPlan:
              $ref: "#/components/schemas/FeeInstalmentPlan"

    TransferFee:
      description: Represents a fee charged to an account for a movement or transfer
      type: object
      properties:
        id:
          format: int64
          description: Unique identifier for the fee record.
          maximum: 99999
          minimum: 0
          type: integer
          readOnly: true
          example: 1
        type:
          description: fee type
          enum:
            - ADVISER_INITIAL
          type: string
          readOnly: true
          example: ADVISER_INITIAL
        amount:
          description: Fee amount for amount based fee
          type: number
          example: 5
        percentage:
          description: Percentage for percentage based fee
          maximum: 100
          exclusiveMaximum: false
          minimum: 0
          exclusiveMinimum: false
          type: number
          example: 5

    FeeInstalmentPlan:
      description: >-
        Represents a monthly installment plan for charging a fee into multiple parts for direct
        debits
      type: object
      additionalProperties: false
      properties:
        totalMonths:
          format: int64
          description: Total number of installments in the plan.
          maximum: 999
          type: integer
          example: 12
        completedMonths:
          format: int64
          description: Number of installments already completed.
          maximum: 999
          type: integer
          readOnly: true
          example: 5

    HMRCProtection:
      description: Represents  HRMC protection rules for a pension product. Only applicable for pension products.
      type: object
      additionalProperties: false
      properties:
        type:
          description: >-
            The type of HMRC protection which applies to this account. Mandatory where HMRC
            protection is true
          enum:
            - ENHANCED_PROTECTION
            - PRIMARY_PROTECTION
            - FIXED_PROTECTION
            - FIXED_PROTECTION_2014
            - FIXED_PROTECTION_2016
            - INDIVIDUAL_PROTECTION_2014
            - INDIVIDUAL_PROTECTION_2016
          type: string
        copyP45Provided:
          description: >-
            Where any drawdown event is selected, then we require a copy of the investor's P45 to
            ensure we have the correct Tax Code.
          default: false
          type: boolean
        certificateNumber:
          description: >-
            The unique reference issued by HMRC for the protection afforded to this pension
            account.
          maxLength: 30
          type: string
          example: FP161234567890A

    SourceOfFunding:
      description: This provides details explaining the source of funds. Only applicable for one-off self contributions for retail accounts.
      type: object
      additionalProperties: false
      properties:
        id:
          description: Unique identifier for the source of fund record.
          maximum: 99999
          type: integer
          readOnly: true
        type:
          description: the Source of Fund type for one off contributions
          enum:
            - DIVIDENDS_OR_COMPANY_PROFITS
            - DIVORCE
            - EARNINGS
            - GIFT
            - INHERITANCE
            - INSURANCE_CLAIMS
            - LOAN
            - LOTTERY_OR_GAMBLING_WIN
            - MATURITY_OR_SURRENDER_OF_LIFE_ASSURANCE
            - OTHER
            - OTHER_COURT_AWARD
            - SALE_OF_INVESTMENTS
            - SALE_OF_PROPERTY_OR_BUSINESS
            - SAVINGS
          type: string
          example: DIVIDENDS_OR_COMPANY_PROFITS
        fields:
          $ref: "#/components/schemas/SourceOfFundingFields"

    SourceOfFundingFields:
      description: Optional fields that can be provided based on the source of funds type
      type: object
      additionalProperties: false
      properties:
        annualSalary:
          description: Optional when type is EARNINGS
          type: number
        jobDescription:
          description: Optional when type is EARNINGS
          type: string
          maxLength: 250
        natureOfBusiness:
          description: Optional when type is EARNINGS
          type: string
          maxLength: 250
        amountReceived:
          description: "Optional when type is DIVIDENDS_OR_COMPANY_PROFITS, DIVORCE, GIFT, INHERITANCE"
          type: number
          example: 15000
        frequency:
          description: Optional when type is DIVIDENDS_OR_COMPANY_PROFITS
          type: string
          example: ANNUALLY
          maxLength: 250
        donorName:
          description: Optional when type is GIFT
          type: string
          maxLength: 250
        dateReceived:
          format: date
          description: Optional when type is INHERITANCE
          type: string
        benefactorName:
          description: Optional when type is INHERITANCE
          type: string
          maxLength: 250
        relationshipToBenefactor:
          description: Optional when type is INHERITANCE
          type: string
          maxLength: 250
        claimValue:
          description: Optional when type is INSURANCE_CLAIMS
          type: number
        providerName:
          description: >-
            Optional when type is INSURANCE_CLAIMS, MATURITY_OR_SURRENDER_OF_LIFE_ASSURANCE,
            SAVINGS
          type: string
          maxLength: 250
        natureOfClaim:
          description: Optional when type is INSURANCE_CLAIMS
          type: string
          maxLength: 250
        loanValue:
          description: Optional when type is LOAN
          type: number
        lenderName:
          description: Optional when type is LOAN
          type: string
          maxLength: 250
        winValue:
          description: Optional when type is LOTTERY_OR_GAMBLING_WIN
          type: number
        sourceOfWinnings:
          description: Optional when type is LOTTERY_OR_GAMBLING_WIN
          type: string
          maxLength: 250
        maturityOrSurrenderValue:
          description: Optional when type is MATURITY_OR_SURRENDER_OF_LIFE_ASSURANCE
          type: number
        awardValue:
          description: Optional when type is OTHER_COURT_AWARD
          type: number
        natureOfAward:
          description: Optional when type is OTHER_COURT_AWARD
          type: string
          maxLength: 250
        dateOfSale:
          format: date
          description: "Optional when type is SALE_OF_INVESTMENTS, SALE_OF_PROPERTY_OR_BUSINESS"
          type: string
        investmentType:
          description: Optional when type is SALE_OF_INVESTMENTS
          type: string
          maxLength: 250
        investmentHoldingPeriod:
          description: Optional when type is SALE_OF_INVESTMENTS
          type: string
          maxLength: 250
        saleAmount:
          description: Optional when type is SALE_OF_PROPERTY_OR_BUSINESS
          type: number
        natureOfPropertyOrBusiness:
          description: Optional when type is SALE_OF_PROPERTY_OR_BUSINESS
          type: string
          maxLength: 205
        sourceOfSavings:
          description: Optional when type is SAVINGS
          type: string
          maxLength: 250
        description:
          description: Optional when type is OTHER
          type: string
          maxLength: 205

    AccountTransfersHeader:
      additionalProperties: false
      required:
        - transfers
      type: object
      properties:
        transfers:
          type: array
          items:
            $ref: "#/components/schemas/AccountTransfer"
        declarations:
          writeOnly: true
          type: array
          items:
            $ref: "#/components/schemas/Declaration"

    AccountTransfer:
      additionalProperties: false
      description: Account Transfer model
      required:
        - type
        - isPartial
        - value
        - provider
      properties:
        id:
          format: int64
          description: SS&C Wealth Platform transfer identifier
          type: integer
          readOnly: true
          example: 0
        accountId:
          description: Unique SS&C Wealth Platform Account identifier
          maxLength: 11
          minLength: 11
          type: string
          readOnly: true
          example: HW00013451A
        tenantId:
          description: Unique SS&C Wealth Platform Tenant identifier
          maxLength: 7
          minLength: 7
          type: string
          readOnly: true
          example: HUBWISE
        adviserId:
          format: string
          description: Unique SS&C Wealth Platform Adviser identifier
          maxLength: 7
          minLength: 7
          type: string
          readOnly: true
          example: E273053
        type:
          description: The type of transfer
          enum:
            - CASH
            - INSPECIE
          type: string
          example: CASH
        direction:
          description: The direction of the transfer
          enum:
            - IN
            - OUT
          type: string
          readOnly: true
          example: IN
        status:
          description: The status of the transfer
          enum:
            - CREATED
            - COMPLETED
            - CANCELLED
            - CLOSED
            - EXPIRED
            - OPEN
            - REJECTED
          type: string
          readOnly: true
          example: CREATED
        startDate:
          format: date
          description: The date the transfer was requested
          type: string
          readOnly: true
          example: "2025-04-15"
        isPartial:
          description: If the transfer is a partial holdings transfer
          type: boolean
          example: false
        investmentInstruction:
          description: >-
            The choice of whether to invest immediately into a model or hold in cash for a cash
            transfer in.
          enum:
            - LEAVE_IN_CASH
            - INVEST_IN_MODEL
          type: string
          example: INVEST_IN_MODEL
        isElectronic:
          description: If a transfer is being processed electronically or manually
          type: boolean
          example: true
          readOnly: true
        value:
          $ref: "#/components/schemas/Value"
        currentYearSubscription:
          $ref: "#/components/schemas/AccountTransferSubscription"
        fee:
          $ref: "#/components/schemas/TransferFee"
        plan:
          $ref: "#/components/schemas/AccountTransferPlan"
        provider:
          $ref: "#/components/schemas/CedingProvider"

    AccountTransferSubscription:
      additionalProperties: false
      description: | 
        Subscription details for an ISA or JISA. Applies to:
        
          - Transfers in, to record the transfered amount
          - Investment account, to record the amount not tranferred. 
      type: object
      properties:
        startDate:
          format: date
          description: The first date of the ISA or JISA subscribtion in the current tax year.
          type: string
          example: "2025-04-15"
        amount:
          format: double
          description: The current tax year ISA or JISA subscriptions being transferred. Only applicable to transfers, not the investment account.
          type: number
          example: 15000
        amountNotTransfered:
          format: double
          description: The current tax year ISA or JISA subscriptions being transferred. Only applicable to the investment account, not transfers.
          type: number
          example: 15000

    AccountTransferPlan:
      additionalProperties: false
      description: The details of the plan being transferred
      required:
        - reference
        - holderName
      type: object
      properties:
        reference:
          format: string
          description: The reference number of the plan being transfered. This will be validated.
          maxLength: 20
          minLength: 1
          type: string
          example: "896546"
        holderName:
          format: string
          description: The registered holder name of the plan being transfered
          maxLength: 70
          minLength: 1
          type: string
          example: James Holden
        type:
          description: >-
            The type of ISA, JISA and pension plan being transfered. This field is only relevant
            for ISA, JISA and pension products.
          enum:
            - CASH
            - STOCKS_AND_SHARES
            - SIPP
            - CONTRACT_IN_ACCORDANCE_WITH_SECTION_591
            - STATUTORY_SCHEME_ESTABLISHED_UNDER_SECTION_611A
            - OVERSEAS_SCHEME
            - AVC
            - FREE_STANDING_AVC
            - DEFERRED_ANNUITY_CONTRACT
            - DEFINED_BENEFITS_RETIREMENT_BENEFITS_SCHEME
            - INTERNAL_BID_TO_BID_TRANSFER
            - MONEY_PURCHASE_RETIREMENT_BENEFITS_SCHEME
            - OCC_SCHEME_APPROVED_UNDER_CH1_PART_XIV_ICTA88
            - PERSONAL_PENSION_SCHEME
            - QROPS
            - RETIREMENT_ANNUITY_CONTRACT
            - SECTION_226_OR_226A_POLICY
            - SECTION_32_BUY_OUT
            - SMALL_SELF_ADMINISTERED_SCHEME
            - STAKEHOLDER_PENSION_PLAN
          type: string
          example: STOCKS_AND_SHARES

    CedingProvider:
      additionalProperties: false
      description: Ceding Provider model
      type: object
      properties:
        id:
          description: Unique SS&C Wealth Platform authorised provider identifier
          maxLength: 10
          minLength: 1
          type: string
          example: HW015
        name:
          description: The provider name
          maxLength: 50
          minLength: 1
          type: string
          readOnly: true
          example: A J Bell Investcentre
        address:
          $ref: "#/components/schemas/AddressLines"
        contactDetails:
          $ref: "#/components/schemas/ReadOnlyContactDetails"

    AddressLines:
      additionalProperties: false
      required:
        - line1
        - postCode
      type: object
      readOnly: true
      properties:
        line1:
          description: Address line 1
          maxLength: 75
          minLength: 1
          type: string
          readOnly: true
          example: A J Bell
        line2:
          description: Address line 2
          maxLength: 75
          type: string
          readOnly: true
          example: "4 Exchange Quay, Salford Quay"
        line3:
          description: Address line 3
          maxLength: 75
          type: string
          readOnly: true
          example: 15 Dalkeith Road
        line4:
          description: Address line 4
          maxLength: 75
          type: string
          readOnly: true
          example: Edinburgh
        line5:
          description: Address line 5
          maxLength: 75
          type: string
          readOnly: true
        postCode:
          description: Postcode
          maxLength: 12
          minLength: 1
          type: string
          readOnly: true
          example: M5 3EE

    ThirdPartiesHeader:
      type: object
      additionalProperties: false
      required:
        - thirdParties
      properties:
        thirdParties:    
          type: array
          maxItems: 10
          items:
            $ref: "#/components/schemas/ThirdParty"

    ThirdParty:
      type: object
      additionalProperties: false
      required:
        - type
      properties:
        id:
          type: integer
          readOnly: true
        type:
          type: string
          enum:
            - BENEFICIARY
            - EMPLOYER
            - POWER_OF_ATTORNEY
        title:
          $ref: "#/components/schemas/Title"
        firstName:
          type: string
          maxLength: 30
        surname:
          type: string
          maxLength: 25
        contactDetails:
          type: object
          additionalProperties: false
          required:
            - phone
            - email
          properties:
            phone:
              type: string
              maxLength: 25
            email:
              type: string
              maxLength: 50
        beneficiaryDetails:
          type: object
          additionalProperties: false
          required:
            - relationship
            - percentage
          properties:
            relationship:
              type: string
              maxLength: 30
            percentage:
              type: number
              maximum: 100
            dateOfBirth:
              type: string
              format: date
        companyName:
          type: string
          maxLength: 50
        companyRegistration:
          type: string
          maxLength: 10
        address:
          $ref: "#/components/schemas/Address"
          
    ThirdPartiesHeaderPatch:
      type: object
      additionalProperties: false
      required:
        - thirdParties
      properties:
        thirdParties:    
          type: array
          maxItems: 10
          items:
            $ref: "#/components/schemas/ThirdPartyPatch"

    ThirdPartyPatch:
      type: object
      additionalProperties: false
      required:
        - id
      properties:
        id:
          type: integer
        title:
          $ref: "#/components/schemas/Title"
        firstName:
          type: string
          maxLength: 30
        surname:
          type: string
          maxLength: 25
        contactDetails:
          type: object
          additionalProperties: false
          required:
            - phone
            - email
          properties:
            phone:
              type: string
              maxLength: 25
            email:
              type: string
              maxLength: 50
        companyName:
          type: string
          maxLength: 50
        companyRegistration:
          type: string
          maxLength: 10
        address:
          $ref: "#/components/schemas/AddressPatch"

    DeletedInfo:
      type: object
      description: Information once a delete operation is performed.
      additionalProperties: false
      properties:
        records:
          maxLength: 3
          type: integer
          description: Number of records deleted during the delete operation
          readOnly: true
          example: 2
        accountId:
          maxLength: 11
          type: string
          description: Account for which the action is being called.
          format: string
          readOnly: true
          example: HW00013451A
        ids:
          type: array
          description: The ids that were deleted.
          readOnly: true
          items:
            type: integer
            description: List of ids which are being deleted.
            readOnly: true

    PortfolioAdjustment:
      type: object
      additionalProperties: false
      required: 
        - type
      properties:
        type:
          type: string
          enum:
            - SWITCH
            - REBALANCE
        id:
          description: SS&C Wealth Platform transfer identifier
          maxLength: 15
          minLength: 1
          type: string
          readOnly: true
          example: "0006737647"
        accountId:
          description: Unique SS&C Wealth Platform Account identifier
          maxLength: 11
          minLength: 11
          type: string
          readOnly: true
          example: HW00013451A
        tenantId:
          description: Unique SS&C Wealth Platform Tenant identifier
          maxLength: 7
          minLength: 7
          type: string
          readOnly: true
          example: HUBWISE
        model:
          $ref: '#/components/schemas/Model'
        declarations:
          type: array
          items:
            $ref: '#/components/schemas/Declaration'

  examples:
    400-BadRequest:
      summary: Path parameter does not conform to API schema
      value:
        {
          "errorCode": "HWA-EXCEPTION-001",
          "message": "Validation Error(s) occurred.",
          "errors": [
              {
                  "field": "productId",
                  "resource": "/accounts",
                  "message": "Product Id is mandatory while creating an account."
              }
          ]
        }

  responses:
    401-Unauthorized:
      description: Unauththenticated request
      headers:
        Request-Id:
          $ref: '#/components/headers/Request-Id'
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          examples:
            Ex1:
              summary: Invalid API token
              value:
                {
                   "errorCode": "HWA-EXCEPTION-006",
                    "message": "Authentication process failed.",
                    "errors": [
                        {
                            "field": "Authentication",
                            "resource": "/accounts/HW00013451A/activate",
                            "message": "Authentication token is missing or invalid."
                        }
                    ]
                }
                
    403-Forbidden:
      description: Unorthorised request
      headers:
        Request-Id:
          $ref: '#/components/headers/Request-Id'
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          examples:
            Ex1:
              summary: Requester not allowed access to the resource
              description: Forbidden
              value:
                errorCode: HWA-EXCEPTION-004
                message: You do not have permission to access this resource

    404-NotFound:
      description: The resource was not found
      headers:
        Request-Id:
          $ref: '#/components/headers/Request-Id'
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          examples:
            Ex1:
              summary: Resource not found
              description: NotFound
              value:
                errorCode: HWA-INVESTOR-001
                message: The requested resource could not be found.

    500-ServerError:
      description: Internal server error
      headers:
        Request-Id:
          $ref: '#/components/headers/Request-Id'
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          examples:
            Ex1:
              summary: Unexpected technical error.
              value:
                errorCode: HWA-EXCEPTION-003
                message: |-
                  An unexpected technical error occurred. 


                  Do not retry the call before the time specified in the Retry-After HTTP response header. If no Retry-After header is returned, do not retry the call.

  securitySchemes:
    bearer-token:
      type: http
      scheme: bearer
      bearerFormat: JWT

    x-api-key:
      type: apiKey
      name: x-api-key
      in: header
