  /accounts/{accountId}/transfers:
    
    post:
      tags:
        - Accounts
      summary: Create transfer(s)
      description: >-
       Creates transfer records to initiate the transfer of cash or assets from an approved counterparty provider into an existing investment account.
       
       
       A single request may contain multiple transfers.
       
       
       Required information includes the Investment Account ID and the Provider ID.
       
       
       Both full and partial transfers are supported. Partial transfers are identified by setting the is partial flag to true. For partial in-specie transfers, additional information must be provided to SS&C Wealth Platform.
      
      
       Additional rules include:
      
      
       1.	The plan reference must match the ceding provider's format.
       
       
       2.	The plan type field is mandatory for ISA, JISA, and pension transfers.
      
      
       3.	For ISA and JISA transfers, current year subscription can be populated if assets were subscribed in the current tax year.
      
      
       4.	For pension transfers, the crystallised value can be provided when assets have already been crystallised. This value cannot exceed the transfer amount. The uncrystallised value will be calculated automatically.
      
      
       For cash transfers, the investment instruction determines whether the transfer value is invested immediately into the model or held as cash.
        
      
       The account record must exist before creating transfer records.

      operationId: createAccountTransfers
      parameters:
        - $ref: '#/components/parameters/Request-Id'
        - name: accountId
          in: path
          description: Unique SS&C Wealth Platform Account identifier
          required: true
          schema:
            type: string
            maxLength: 11
          example: HW00013451A
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccountTransfersHeader"
            examples:
              Ex1:
                summary: Create a full ISA cash transfer in for an ISA
                value: 
                  {
                    "transfers": [
                      {
                        "type": "CASH",
                        "isPartial": false,
                        "investmentInstruction": "INVEST_IN_MODEL",
                        "value": {
                          "amount": 15000,
                          "currency": "GBP"
                        },
                        "currentYearSubscription": {
                          "amount": 10000,
                          "startDate": "2025-05-01"
                        },
                        "fee": {
                          "amount": 50
                        },
                        "plan": {
                          "reference": "896546",
                          "holderName": "Mr John Doe",
                          "type": "STOCKS_AND_SHARES"
                        },
                        "provider": {
                          "id": "HW009"
                        }
                      }
                    ],
                    "declarations": [
                      {
                        "adviserId": "E008469",
                        "templateId": "TRANSFR_IN",
                        "acknowledgement": true
                      }
                    ]
                  }
              Ex2:
                summary: Create a full SIPP Cash Transfer In
                value: 
                  {
                    "transfers": [
