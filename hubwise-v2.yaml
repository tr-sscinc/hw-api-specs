  /investors/{investorId}/vulnerabilities:
    
    post:
      tags:
        - Investors
      summary: Create an investors vulnerabilities
      description: >
        Creates one or more characteristics of vulnerability records for an existing investor.


        This endpoint applies only to investors of type Individual or Court Appointed Deputy and requires the SS&C Hubwise Investor ID generated during investor creation.


        This endpoint should be used when creating new vulnerability records against an existing investor. Each record must include the vulnerability characteristic and its associated service level. If a start date is not provided, it will default to the current date.


        If vulnerability characteristics already exist for the investor, the update endpoint must be used.


        The endpoint must be called once per investor record.

      operationId: createInvestorVulnerabilities
      parameters:
        - $ref: '#/components/parameters/Request-Id'
        - name: investorId
          in: path
          description: Unique SS&C Hubwise Investor identifier
          required: true
          schema:
            type: string
            maxLength: 14
          example: HWI04003219
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VulnerabilityHeader"
            examples:
              Ex1:
                summary: Characteristics of a vulnerable investor
                value:
                  {
                    "vulnerabilities":
                      [
                        {
                          "type": "HEALTH",
                          "serviceLevel": "SPEAK_LOUDLY_AND_CLEARLY",
