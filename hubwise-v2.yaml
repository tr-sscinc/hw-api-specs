  /fee-groups:

    post:
      tags:
        - Fee Groups
      summary: Create a Fee Group
      description: >
        Creates a new Fee Group, linking one or more eligible investment accounts under a shared fee qualification (fee type and fee code).


        A Fee Group is identified by a user-supplied `groupId` which must be unique per tenant. Each account added to the group must already exist, must qualify for the requested `feeType` and `feeCode`, must be denominated in GBP, and must not be soft-deleted.


        On success the response returns the persisted Fee Group with enriched account details (account name and product identifier).
      operationId: createFeeGroup
      parameters:
        - $ref: '#/components/parameters/Request-Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFeeGroupRequest"
            examples:
              Ex1:
                summary: Create a Fee Group with a single account
                value:
                  {
                    "groupId": "SMITHSPLT01",
                    "feeType": "PLATFORM_ANNUAL",
                    "feeCode": "SA0001",
                    "accounts": [
                      { "id": "HW04003258A" }
                    ]
                  }
              Ex2:
                summary: Create a Fee Group with multiple accounts
                value:
                  {
                    "groupId": "SMITHSADV01",
                    "feeType": "ADVISER_ANNUAL",
                    "feeCode": "AF0001",
                    "accounts": [
                      { "id": "HW04003258A" },
                      { "id": "HW04003259B" },
                      { "id": "HW04003260C" }
                    ]
                  }
      responses:
        "201":
          description: Fee Group created.
          headers:
            Request-Id:
              $ref: "#/components/headers/Request-Id"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeeGroupResponse"
              examples:
                Ex1:
                  summary: Fee Group created with a single account
                  value:
                    {
                      "groupId": "SMITHSPLT01",
                      "status": "ACTIVE",
                      "feeType": "PLATFORM_ANNUAL",
                      "feeCode": "SA0001",
                      "accounts": [
                        {
                          "id": "HW04003258A",
                          "name": "Mr John Smith",
                          "productId": "HIS"
                        }
                      ]
                    }
        "400":
          description: Bad request
          headers:
            Request-Id:
              $ref: "#/components/headers/Request-Id"
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
              examples:
                DuplicateGroupId:
                  summary: groupId already exists for the tenant
                  value:
                    detail: The Group ID must be unique.
                AccountNotEligibleOrMissing:
                  summary: An account does not exist or does not qualify for the requested fee type / fee code
                  value:
                    detail: "Account HW04003258A cannot be added to this Fee Group because it does not meet the required criteria."
                NonGbpAccount:
                  summary: An account base currency is not GBP
                  value:
                    detail: "Account HW04003258A cannot be added to a Fee Group because its base currency is not GBP."
        "401":
          $ref: "#/components/responses/401-Unauthorized"
        "403":
          $ref: "#/components/responses/403-Forbidden"
        "404":
          $ref: "#/components/responses/404-NotFound"
        "500":
          $ref: "#/components/responses/500-ServerError"

  /fee-groups/{feeGroupId}:

    get:
      tags:
        - Fee Groups
      summary: Retrieve a Fee Group by ID
      description: >
        Retrieves a Fee Group and its current member accounts using a case-sensitive exact match on `groupId`.


        The response includes enriched member details (account name and product identifier). The Fee Group must belong to the authenticated tenant; cross-tenant lookups return 404.
      operationId: retrieveFeeGroup
      parameters:
        - $ref: '#/components/parameters/Request-Id'
        - name: feeGroupId
          in: path
          description: User-supplied Fee Group identifier. Case-sensitive exact match.
          required: true
          schema:
            type: string
            maxLength: 11
          example: SMITHSPLT01
      responses:
        "200":
          description: Fee Group retrieved.
          headers:
            Request-Id:
              $ref: "#/components/headers/Request-Id"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeeGroupResponse"
              examples:
                Ex1:
                  summary: Active Fee Group with two member accounts
                  value:
                    {
                      "groupId": "SMITHSPLT01",
                      "status": "ACTIVE",
                      "feeType": "PLATFORM_ANNUAL",
                      "feeCode": "SA0001",
                      "accounts": [
                        {
                          "id": "HW04003258A",
                          "name": "Mr John Smith",
                          "productId": "HIS"
                        },
                        {
                          "id": "HW04003259B",
                          "name": "Mrs Jane Smith",
                          "productId": "HIS"
                        }
                      ]
                    }
        "400":
          description: Bad request
          headers:
            Request-Id:
              $ref: "#/components/headers/Request-Id"
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              examples:
                400-InvalidQueryParam:
                  $ref: '#/components/examples/400-InvalidQueryParam'
                400-InvalidRequestHeader:
                  $ref: '#/components/examples/400-InvalidRequestHeader'
        "401":
          $ref: "#/components/responses/401-Unauthorized"
        "403":
          $ref: "#/components/responses/403-Forbidden"
        "404":
          $ref: "#/components/responses/404-NotFound"
        "500":
          $ref: "#/components/responses/500-ServerError"

    patch:
      tags:
        - Fee Groups
      summary: Update a Fee Group
      description: >
        Adds or removes member accounts on an existing Fee Group. The request payload contains an `operations` array of `add` and/or `delete` actions.


        Operations are applied in array order within a single transaction. If any operation fails, all prior operations in the same request are rolled back.


        For `add` operations, each account must exist, must qualify for the group's `feeType`/`feeCode`, must be denominated in GBP, and must not be soft-deleted. For `delete` operations, each account must currently be a member of the Fee Group.
      operationId: modifyFeeGroup
      parameters:
        - $ref: '#/components/parameters/Request-Id'
        - name: feeGroupId
          in: path
          description: User-supplied Fee Group identifier. Case-sensitive exact match.
          required: true
          schema:
            type: string
            maxLength: 11
          example: SMITHSPLT01
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFeeGroupRequest"
            examples:
              Ex1:
                summary: Add a single account
                value:
                  {
                    "operations": [
                      {
                        "action": "add",
                        "accounts": [
                          { "id": "HW04003261D" }
                        ]
                      }
                    ]
                  }
              Ex2:
                summary: Remove a single account
                value:
                  {
                    "operations": [
                      {
                        "action": "delete",
                        "accounts": [
                          { "id": "HW04003258A" }
                        ]
                      }
                    ]
                  }
              Ex3:
                summary: Combined add + delete in a single request
                value:
                  {
                    "operations": [
                      {
                        "action": "delete",
                        "accounts": [
                          { "id": "HW04003258A" }
                        ]
                      },
                      {
                        "action": "add",
                        "accounts": [
                          { "id": "HW04003261D" },
                          { "id": "HW04003262E" }
                        ]
                      }
                    ]
                  }
      responses:
        "200":
          description: Fee Group updated.
          headers:
            Request-Id:
              $ref: "#/components/headers/Request-Id"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeeGroupResponse"
              examples:
                Ex1:
                  summary: Fee Group with updated members after add+delete
                  value:
                    {
                      "groupId": "SMITHSPLT01",
                      "status": "ACTIVE",
                      "feeType": "PLATFORM_ANNUAL",
                      "feeCode": "SA0001",
                      "accounts": [
                        {
                          "id": "HW04003259B",
                          "name": "Mrs Jane Smith",
                          "productId": "HIS"
                        },
                        {
                          "id": "HW04003261D",
                          "name": "Mr Robert Smith",
                          "productId": "HIS"
                        },
                        {
                          "id": "HW04003262E",
                          "name": "Ms Anna Smith",
                          "productId": "HIS"
                        }
                      ]
                    }
        "400":
          description: Bad request
          headers:
            Request-Id:
              $ref: "#/components/headers/Request-Id"
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
              examples:
                NoOperations:
                  summary: operations array is empty
                  value:
                    detail: 'At least one "add" or "delete" action is required.'
                AccountNotEligibleOrMissing:
                  summary: Account does not exist or does not qualify for the group's fee type / fee code
                  value:
                    detail: "Account HW04003261D cannot be added to this Fee Group because it does not meet the required criteria."
                NonGbpAccount:
                  summary: Account base currency is not GBP
                  value:
                    detail: "Account HW04003261D cannot be added to a Fee Group because its base currency is not GBP."
                NotMember:
                  summary: Account targeted for delete is not currently a member
                  value:
                    detail: "Account HW04003258A cannot be removed from this Fee Group as it is not currently a member."
        "401":
          $ref: "#/components/responses/401-Unauthorized"
        "403":
          $ref: "#/components/responses/403-Forbidden"
        "404":
          $ref: "#/components/responses/404-NotFound"
        "500":
          $ref: "#/components/responses/500-ServerError"

    delete:
      tags:
        - Fee Groups
      summary: Delete a Fee Group
      description: >
        Soft-deletes a Fee Group by setting its status to `INACTIVE`. Member account links are retained but the group is no longer active.


        A Fee Group already in `INACTIVE` state cannot be deleted again — a second call returns 404 with `HWA-FEE-GROUP-006`.
      operationId: deleteFeeGroup
      parameters:
        - $ref: '#/components/parameters/Request-Id'
        - name: feeGroupId
          in: path
          description: User-supplied Fee Group identifier. Case-sensitive exact match.
          required: true
          schema:
            type: string
            maxLength: 11
          example: SMITHSPLT01
      responses:
        "204":
          description: Fee Group deleted. No response body.
          headers:
            Request-Id:
              $ref: "#/components/headers/Request-Id"
        "400":
          description: Bad request
          headers:
            Request-Id:
              $ref: "#/components/headers/Request-Id"
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              examples:
                400-InvalidQueryParam:
                  $ref: '#/components/examples/400-InvalidQueryParam'
                400-InvalidRequestHeader:
                  $ref: '#/components/examples/400-InvalidRequestHeader'
        "401":
          $ref: "#/components/responses/401-Unauthorized"
        "403":
          $ref: "#/components/responses/403-Forbidden"
        "404":
          $ref: "#/components/responses/404-NotFound"
        "500":
          $ref: "#/components/responses/500-ServerError"

  /non-pension-illustrations:

    post:
      tags:
        - Illustrations
      summary: Create an Illustration for non pension products
      description: |
        Creates an illustration based on the supplied scenario.


        You can use this endpoint to generate a non-pension illustration for an existing investment account or a hypothetical investment account that has not yet been onboarded to the platform. The default illustration period is 10 years, but you can specify a different forecast period if required.

        When generating an illustration for an existing investment account, the only required field is the Account ID. You may also optionally model changes to the account. If the request payload includes a money movement, transfer, or fee without an associated ID, it will be treated as a new item.

        You can retrieve the ID of an existing regular money movement or fee using the relevant GET endpoint and include that ID along with any proposed amendments. This can include specifying an end date that falls before the illustration period, allowing you to generate an illustration that excludes the movement or fee entirely.

        When illustrating a hypothetical investment account, you need to populate the Product ID plus at least one money movement or transfer. You also need to provide an investment strategy by either specifying the Model ID to use an existing model portfolio or defining individual asset allocations.

        You can provide details of any one-off or ongoing fees. If the hypothetical account will belong to a Fee Group for a particular fee type, use the Band Adjustment Amount field to specify the value of the other accounts in the group. This ensures the fee is correctly illustrated.

      operationId: createNonPensionIllustration
      parameters:
        - $ref: '#/components/parameters/Request-Id'
        - name: generateData
          in: query
          required: false
          schema:
            type: boolean
            enum: [true, false]
            default: true
          example: true
          description: Indicates whether illustration data should be generated.
        - name: generateDocument
          in: query
