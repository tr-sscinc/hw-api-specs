                  summary: Added a banded annual adviser fee to the account.
                  value:
                    {
                        "fees": [
                          {
                            "id": 1,
                            "accountId": "HW04003258A",
                            "adviserId": "E008469",
                            "tenantId": "HUBWISE",
                            "type": "ADVISER_ANNUAL",
                            "status": "ACTIVE",
                            "code": "AFGVCD",
                            "vatIncluded": true,
                            "startDate": "2025-04-28",
                            "method": "IN_ADVANCE",
