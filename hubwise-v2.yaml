        - frequency
        - fundingAccountId
        - nextDate
      type: object
      properties:
        id:
          description: SS&C Wealth Platform inter-account transfer identifier
          type: integer
          format: int64
          readOnly: true
          example: 1001
        accountId:
          description: Unique SS&C Wealth Platform Account identifier (destination account)
          type: string
          minLength: 11
          maxLength: 11
          readOnly: true
          example: HW00013451A
        tenantId:
          description: Unique SS&C Wealth Platform Tenant identifier
          type: string
          minLength: 7
          maxLength: 7
          readOnly: true
          example: HUBWISE
        adviserId:
          description: Unique SS&C Wealth Platform Adviser identifier
          type: string
          maxLength: 7
          readOnly: true
          example: E273053
        value:
          description: Transfer value
          type: number
          format: double
          example: 5000.00
        currency:
          description: ISO 4217 currency code
          type: string
          maxLength: 3
          example: GBP
        frequency:
          description: Transfer frequency
          enum:
            - ANNUALLY
            - MONTHLY
            - QUARTERLY
            - HALF_YEARLY
            - ONE_OFF
          type: string
          example: ONE_OFF
        fundingAccountId:
          description: Unique SS&C Wealth Platform Account identifier for the source (funding) account
          type: string
          minLength: 11
          maxLength: 11
          example: HW00013452A
        nextDate:
          description: Transfer start date (YYYY-MM-DD). Must not be in the past.
          type: string
          format: date
          example: "2026-08-01"
        status:
          description: Transfer status
          enum:
            - INCEPTED
            - NEW
            - COMPLETE
            - PENDING
            - ARCHIVED
            - INACTIVE_INCOME
          type: string
          readOnly: true
          example: INCEPTED

    InterAccountTransfersResponse:
      additionalProperties: false
      type: object
      properties:
        interAccountTransfers:
          type: array
          readOnly: true
          items:
            $ref: "#/components/schemas/InterAccountTransfer"

    InterAccountTransferPatch:
      additionalProperties: false
      type: object
      properties:
        value:
          description: Transfer value
          type: number
          format: double
          example: 7500.00
        currency:
          description: ISO 4217 currency code
