      summary: Update an activated account
      description:
        Updates an activated investment account.

        This endpoint supports the modification of the account name or status for activated Individual, Corporate, Trust, and Joint accounts. 
        
        If an investors name is being updated, the account name should be updated in line with this where applicable. The account name is used in documentation and displayed in the Adviser Portal.


        1.	Corporate or Trust accounts - Organisation name


        2.	Individual accounts  - title + firstName + middleName + surname


        3.	Joint accounts -  Concatenation of related investor names separated by an ampersand (&)


        If the name exceeds 50 characters, the middle name and title should be removed or shortened as required.


        This endpoint also supports updating the account status. Only the following statuses can be set via the API. Allowed values are ACTIVE, DECEASED, TRADING_SUSPENDED, INTENTION_TO_CLOSE, and NON_UK_RESIDENT.

      operationId: modifyAccount
      parameters:
        - $ref: '#/components/parameters/Request-Id'
        - name: accountId
          in: path
          description: Unique SS&C Wealth Platform Account identifier
          required: true
          schema:
            type: string
            maxLength: 11
          example: HW00013451A
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccountPatch"
            examples:
              Ex1:
                summary: Update accounts name
                value:
                  {
                    "name": "Mr Sam John James-Smith"
                  }
              Ex2:
                summary: Update account status
                value:
                  {
                    "status": "DECEASED"
                  }

