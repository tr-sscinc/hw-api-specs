  /accounts:
    
    post:
      tags:
        - Accounts
      operationId: createAccount
      summary: Create a pending Account
      description: 
        Creates a new investment account.
        
        
        This endpoint supports the creation of Individual, Corporate, Trust, and Joint accounts. The required data varies depending on the product type and includes core account profile information, related investor(s), the product, and the investment model.
        
        
        All related investors must be created before the account is created. The product and model to be assigned to the account must be included in the request.
       
       
        Once the account has been created, the product, account type, and currencies cannot be modified. The number and type of related investors permitted for an account varies depending on the product type.
        
        
        The SS&C Wealth Platform Account ID returned in the response uniquely identifies the account and must be used for subsequent account maintenance operations.
        
        
        New accounts are created in a PENDING status. To activate the account, the account activation endpoint must be called once all required account endpoints have been called (for example Bank Accounts, Money Movements, Transfers, Fees, and Relationships).
        
        
        The endpoint must be called once per account record.
        
        
        The account name is used in documentation and displayed in the Adviser Portal.
       
       
        1.	Corporate or Trust accounts - Organisation name
        
        
        2.	Individual accounts  - title + firstName + middleName + surname
        
        
        3.	Joint accounts -  Concatenation of related investor names separated by an ampersand (&)
       
       
        If the name exceeds 50 characters, the middle name and title should be removed or shortened as required.

      parameters:
        - $ref: '#/components/parameters/Request-Id'
