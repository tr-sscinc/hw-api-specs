          example: 63.270000
        commission:
          type: number
          description: The commission charged on the trade
          example: 10.000000
        charges:
          type: number
          description: Any additional charges applied to the trade
          example: 2.500000
        settlementDate:
          type: string
          description: The settlement date in yyyyMMdd format
          maxLength: 8
          minLength: 8
          example: "20260205"
        orderType:
          type: string
          description: The type of order executed
          enum:
