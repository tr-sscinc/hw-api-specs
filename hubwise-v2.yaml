      summary: Update an activated account
      description: 
        Updates an activated investment account.
        
        This endpoint supports the modification of the account name for activated Individual, Corporate, Trust, and Joint accounts. If an investors name is being updated, the account name should be updated in line with this where applicable.

        The account name is used in documentation and displayed in the Adviser Portal.
       
       
        1.	Corporate or Trust accounts - Organisation name
        
        
        2.	Individual accounts  - title + firstName + middleName + surname
        
        
