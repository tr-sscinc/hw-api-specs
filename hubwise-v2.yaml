  /accounts/{accountId}/inter-account-transfers:

    post:
      tags:
        - Accounts
      summary: Create inter-account transfer(s)
      description: >-
        Creates one or more internal transfer records between two investment accounts belonging to the same investor.

        Supported destination account product types are GIA, ISA, and JISA. Supported funding account product types are GIA and ISA. Corporate and trust accounts are not supported.

        For ISA and JISA destination accounts, the subscription value for a one-off (first) transfer is validated against the remaining allowance for the applicable tax year.

        The funding account must have sufficient balance to cover the transfer value. Both accounts must belong to the same investor.
      operationId: createInterAccountTransfers
      parameters:
        - $ref: '#/components/parameters/Request-Id'
        - name: accountId
          in: path
          description: Unique SS&C Wealth Platform Account identifier (destination account)
          required: true
          schema:
            type: string
            minLength: 11
            maxLength: 11
          example: HW00013451A
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InterAccountTransfersHeader"
            examples:
              Ex1:
                summary: Create a one-off inter-account transfer from GIA to ISA
                value:
                  {
                    "interAccountTransfers": [
                      {
                        "value": 5000.00,
                        "currency": "GBP",
                        "frequency": "ONE_OFF",
                        "fundingAccountId": "HW00013452A",
                        "nextDate": "2026-08-01"
                      }
                    ],
                    "declarations": [
                      {
                        "adviserId": "E273053",
                        "templateId": "AMENDMENT_CONSENT",
                        "acknowledgement": true
                      },
                      {
                        "adviserId": "E273053",
                        "templateId": "INTERNAL_TRANSFER_CONSIDERATIONS",
                        "acknowledgement": true
                      }
                    ]
                  }
      responses:
        "201":
          description: Inter-account transfer(s) created successfully.
          headers:
            Request-Id:
              $ref: '#/components/headers/Request-Id'
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InterAccountTransfersResponse"
              examples:
                Ex1:
                  summary: One-off inter-account transfer created
                  value:
                    {
                      "interAccountTransfers": [
                        {
                          "id": 1001,
                          "accountId": "HW00013451A",
                          "tenantId": "HUBWISE",
                          "adviserId": "E273053",
                          "value": 5000.00,
                          "currency": "GBP",
                          "frequency": "ONE_OFF",
                          "fundingAccountId": "HW00013452A",
                          "nextDate": "2026-08-01",
                          "status": "INCEPTED"
                        }
                      ]
                    }
        "400":
          $ref: "#/components/responses/400-BadRequest"
        "401":
          $ref: "#/components/responses/401-Unauthorized"
        "403":
          $ref: "#/components/responses/403-Forbidden"
        "404":
          $ref: "#/components/responses/404-NotFound"
        "500":
          $ref: "#/components/responses/500-ServerError"

    get:
      tags:
        - Accounts
      summary: Retrieve inter-account transfers
      description: >-
        Retrieves all active inter-account transfer records for a specific investment account.

        Returns an empty collection if no active records exist.
