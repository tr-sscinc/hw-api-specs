  /accounts/{accountId}/investment-instructions:
    
    post:
      tags:
        - Accounts
      summary: Create investment instructions on an account
      description: |
        Allows investors, or advisers on their behalf, to create bespoke investment instructions for their accounts, outside of the standard Hubwise model based structure. 

        The endpoint allows buys, sells and/or switch instructions and also allows these to be specified as monetary amounts, quantities or in the case of sells and switches, as percentages of current holdings. 
        
        1. Purchases can be specified by either a monetary amount using the action type of “Invest” or a quantity e.g. units or shares using an action type of “Buy”

        2. Sales can be specified as a monetary amount, a “Redemption” or as quantity or percentages (of current holdings) using the action type “Sell”

        3. Switches, are the target side of associated Sells or Redemptions and are instructed as a percentage of proceeds of those instructions.

        Each request payload can contain multiple individual instructions. For example, a request may contain multiple stand-alone instructions, or it might contain a combination of sell/redemption and switch instructions, using the proceeds of sales to switch into one or more alternative instruments. Existing SS&C Hubwise sequencing and synchronised settlement routines will determine the order execution, there is no requirement for the requester to specify a sequence.

        There needs to be enough available cash, stock/units to action all of the requested instructions in a request payload, otherwise the whole request will be rejected and none of the instructions will be actioned.
        
        The SS&C Wealth Platform Instruction ID returned in the response uniquely identifies the investment instruction record.
      operationId: createInvestmentInstructions
      parameters:
        - $ref: '#/components/parameters/Request-Id'
        - name: accountId
          in: path
          description: Unique SS&C Wealth Platform Account identifier
          required: true
          schema:
            type: string
            maxLength: 11
          example: HW00013451A
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvestmentInstructions"
            examples:
              Ex1:
                summary: create two purchase instructions, one a buy as quantity of an instrument and the other an Invest, as a monetary
                value: 
                  {
                    "instructions": [
                      {
                        "action": "BUY",
                        "requestedBy": "XO",
                        "instrumentDetails": {
                          "isin": "GB00B4L5Y983",
                          "exchange": "XLON",
                          "marketSettlementCurrency": "GBP"
                        },
                        "orderDetails": {
                          "quantity": 1250.123456
                        }
                      },
                      {
                        "action": "INVEST",
                        "requestedBy": "XO",
                        "instrumentDetails": {
                          "isin": "GB00B4L5A675",
