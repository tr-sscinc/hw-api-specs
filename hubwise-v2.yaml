        - marketSettlementCurrency
      description: The details of the investment instrument being bought or sold in an investment instruction
      type: object
      additionalProperties: false
      properties:
        isin:
          maxLength: 12
          minLength: 12
          type: string
          description: The ISIN identifier for the chosen investment instrument. Must be combined with valid exchange AND marketSettlementCurrency to uniquely identify the instrument. The instrument must be available on the requester's Buy List.
          example: GB0002405495
        exchange:
          maxLength: 4
          minLength: 4          
          type: string 
          description: The exchange market identifier code (MIC) on which the instrument is traded. 
          example: XLON
        marketSettlementCurrency:
          maxLength: 3
          minLength: 3          
          type: string 
          description: The currency in which the specified  instrument is traded. 
          example: GBP  

    InvestmentInstructions:
      description: Investment Instructions outside of a standard Model Portfolio
      required:
        - instructions
      type: object
      additionalProperties: false
      properties:
        instructionsUrn:
          format: integer 
          description: Unique Request identifier
          maxLength: 11
          minLength: 11
          type: integer
          readOnly: true
          example: 00000134513
        accountId:
          format: string
          description: Unique SS&C Wealth Platform Account identifier
          maxLength: 11
          minLength: 11
          type: string
          readOnly: true
          example: HW00013451A
        tenantId:
          format: string
          description: Unique SS&C Wealth Platform Tenant identifier
          maxLength: 7
          minLength: 7
          type: string
          readOnly: true
          example: HUBWISE
        adviserId:
          format: string
          description: Unique SS&C Wealth Platform Adviser identifier
          maxLength: 7
          minLength: 7
          readOnly: true
          type: string
          example: E273053
        requestStatus:
          description: The status of the overall request
          enum:
            - NEW
            - FAILED
          type: string
          readOnly: true
          example: NEW
        instructions:
          type: array
          description: An array of investment instructions.
          items:
            $ref: "#/components/schemas/InvestmentInstruction"

    InvestmentInstruction:
      description: Investment Instructions outside of a standard Model Portfolio
      required:
        - action
        - requestedBy
        - instrumentDetails
        - orderDetails
      type: object
      additionalProperties: false
      properties:
        id:
          format: int64
          description: SS&C Wealth Platform Instruction identifier
          type: integer
          readOnly: true
          example: 2
        tradeStatus:
          description: The status of the individual investment instruction
          enum:
            - NEW
            - FAILED
          type: string
          readOnly: true
          example: NEW  
        action:
          description: >-
            The type of investment instruction to action against the account;
            <ul>
            <li>BUY: Purchases a specified quantity (units/shares) of an instrument.</li>
            <li>INVEST: Buy a specified monetary amount of an instrument.</li>
            <li>SELL: Sell a quantity or percentage of an individual stock item.</li>
            <li>REDEMPTION: Sell a specified monetary amount of an individual stock item.</li>
            <li>SWITCH: Used to identify the target side of a switch. Specified as a percentage to reinvest.</li>
            </ul>
          enum:
            - BUY
            - INVEST
            - SELL
            - REDEMPTION
            - SWITCH
          type: string
          example: REDEMPTION
        requestedBy:
          description: >-
            Who is the decision maker in regards to this request, used for Transaction Reporting and/or downstream processing
            <ul>
            <li>DFM: A Discretionary Manager making a decision either ad-hoc or by algorithm e.g. rebalance</li>
            <li>CLIENT: An Advised Client. Client makes the ultimate decision to proceed, but on the basis of advice received.</li>
            <li>XO: An Execution Only Client. No Adviser involvement, the client is making the decision and providing the instruction(s)</li>
            </ul>
          enum:
            - DFM
            - CLIENT
            - XO
          type: string
          example: XO
        instrumentDetails:
          $ref: "#/components/schemas/InstrumentDetails" 
        orderDetails:
          $ref: "#/components/schemas/OrderDetails" 

