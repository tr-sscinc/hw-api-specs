openapi: 3.0.1
info:
  title: SS&C Wealth Platform API
  version: 0.8.14
  description: API Contract to integrate with SS&C Wealth Platform
  
servers:
  - url: "https://rest-qd.hubwise.co.uk/adviser/v2"
    description: Pilot/UAT environment
  - url: "https://rest-qi.hubwise.co.uk/adviser/v2"
    description: Preproduction environment
  - url: "https://rest.hubwise.co.uk/adviser/v2"
    description: Production environment

tags:
  - name: Investors
    description: Capability to create, retrieve, and update investors, including the ability to manage vulnerability information for investors.
  - name: Accounts
    description: Capability to create and service accounts, including the ability to retrieve account details and manage account-related operations.
  - name: Fee Groups
    description: Capability to manage fee groups, allowing for the definition and retrieval of fee structures applicable to investors and accounts.
  - name: Illustrations
    description: Capability to generate illustrations for investors and accounts, providing visual representations of financial scenarios and projections.

security:
  - bearer-token: []

paths:

  /investors:
    
    post:
      tags:
        - Investors
      summary: Create an Investor
      description: >
        Creates a new investor record.


        This endpoint supports the creation of Individual, Corporate, and Trust investors. The required data varies depending on the investor type and includes core profile information, contact details, one or more addresses, and one or more territorial profiles.
        
        
        This endpoint should be used when creating new investor records. An investor can have a maximum of 10 addresses, 5 nationalities, and 5 tax residencies.
        
        
        The SS&C Wealth Platform Investor ID returned in the response payload uniquely identifies the investor and must be used for all subsequent investor maintenance and account creation operations.
        
        
        The endpoint must be called once for each investor record to be created.
      operationId: createInvestor
      parameters:
        - $ref: '#/components/parameters/Request-Id'
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Investor"
