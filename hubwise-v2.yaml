  /accounts/{accountId}/money-movements:
    
    post:
      tags:
        - Accounts
      summary: Create Money Movement(s)
      description: |
        Creates one or more money movement transaction records for an existing investment account.
        
        
        This endpoint can be used to add or remove money from an account on either a one-off or recurring basis. Supported movement types include:
        
        
        1. Contributions
        
        
        2. Withdrawals
        
        
        3. Pension Decumulation transactions such as Pension Commencement Lump Sum (PCLS), Uncrystallised Funds Pension Lump Sum (UFPLS), Drawdown Income
        
        
        A single request can include multiple movements, such as a combination of regular and lump-sum contributions or contributions and withdrawals.
        
        
        The SS&C Wealth Platform Movement ID returned in the response uniquely identifies the movement record.
        
        
        The account record and bank details must exist before creating money movements.
      operationId: createAccountMovements
      parameters:
        - $ref: '#/components/parameters/Request-Id'
        - name: accountId
          in: path
          description: Unique SS&C Wealth Platform Account identifier
          required: true
          schema:
            type: string
            maxLength: 11
          example: HW00013451A
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MovementsHeader"
            examples:
