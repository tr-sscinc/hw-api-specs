      description: >-
        Investment model linked to the account.


        For standard accounts, provide `id` to reference a single model portfolio.


        For Multiple Investment Strategy (MIS) accounts, omit `id` and instead provide an
        `allocations` array. Each allocation references a sub-account model and specifies the
        percentage of the portfolio to allocate to it. Allocations may reference a model by
        `modelId` or contain a direct `instruments` array; the percentages across all allocations
        must sum to 100.
      type: object
      additionalProperties: false
      properties:
        id:
          format: string
          description: >-
            Unique SS&C Wealth Platform Model identifier. Must not be provided when `allocations` is present.
          maxLength: 11
          minLength: 11
          type: string
          example: HW000000090
        name:
          format: string
          description: >-
            Display name for the MIS strategy. Applies to MIS accounts only.
          maxLength: 100
          minLength: 1
          type: string
          example: Sam John MIS Strategy
        type:
          description: >-
            The type of investment strategy. Use `MULTIPLE_INVESTMENT_STRATEGY` for MIS accounts.
          type: string
          enum:
            - MULTIPLE_INVESTMENT_STRATEGY
          example: MULTIPLE_INVESTMENT_STRATEGY
        providerId:
          format: string
          description: >-
            Unique SS&C Wealth Platform tenant ID for the model owner. If not provided the tenantId
            against the token will be used. Applies to standard accounts only.
          maxLength: 7
          minLength: 7
          type: string
          example: HUBWISE
        date:
          format: date
          description: The date against the model. If not provided the latest date will be selected.
          type: string
          example: "2020-04-28"
        allocations:
          description: >-
            Array of model allocations for a Multiple Investment Strategy (MIS) account. Each entry
            specifies either a sub-account model or a direct instrument list, along with its
            percentage of the total portfolio.
          type: array
          minItems: 2
          items:
            $ref: "#/components/schemas/MisModelAllocation"

    MisModelAllocation:
      description: >-
        Defines a single sub-account allocation within a Multiple Investment Strategy (MIS).
        Each allocation creates a sub-account for either a specified model or a set of
        directly held instruments. Exactly one of `modelId` or `instruments` must be provided.
      type: object
      additionalProperties: false
      properties:
        accountId:
          format: string
          description: >-
            The SS&C Wealth Platform Account identifier for the sub-account created for this
            allocation. Populated in the response only; read-only.
          maxLength: 11
          minLength: 11
          type: string
          readOnly: true
          example: HW04003261B
        modelId:
          format: string
          description: >-
            Unique SS&C Wealth Platform Model identifier for this sub-account allocation.
            Required when `instruments` is not provided.
          maxLength: 11
          minLength: 11
          type: string
          example: HW000001984
        providerId:
          format: string
          description: >-
            Unique SS&C Wealth Platform tenant ID for the model owner. If not provided the tenantId
            against the token will be used. Applies to model-based allocations only.
          maxLength: 7
          minLength: 7
          type: string
          example: DFM0001
        percentage:
          type: number
          format: double
          description: >-
            The percentage of the total portfolio to allocate to this sub-account.
            Must be a positive number. All allocation percentages must sum to 100.
            Required when `modelId` is provided.
          minimum: 0.01
          maximum: 99.99
          example: 60
        date:
          format: date
          description: >-
            The model date for this allocation. If not provided the latest model date will be used.
            Applies to model-based allocations only.
          type: string
          example: "2024-07-01"
        instruments:
          description: >-
            Array of directly held instruments for this sub-account allocation.
            Required when `modelId` is not provided. The percentage of each instrument
            represents its share of the total portfolio; all instrument percentages within
            this allocation must sum to the allocation's contribution to the portfolio total.
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/MisInstrument"

    MisInstrument:
      description: >-
        Defines a directly held instrument within a MIS instrument-based allocation.
      required:
        - isin
        - exchange
        - currency
        - percentage
      type: object
      additionalProperties: false
      properties:
        isin:
          format: string
          description: International Securities Identification Number for the instrument.
          maxLength: 12
          minLength: 12
          type: string
          example: LU0252633754
        exchange:
          format: string
          description: Market Identifier Code (MIC) of the exchange on which the instrument is traded.
          maxLength: 4
          minLength: 4
          type: string
          example: XLON
        currency:
          format: string
          description: currency code for the instrument.
          maxLength: 3
          minLength: 3
          type: string
          example: GBP
        percentage:
          type: number
          format: double
          description: >-
            The percentage of the total portfolio to allocate to this instrument.
            Must be a positive number.
          minimum: 0.01
          maximum: 99.99
          example: 10

    CorrespondenceHeader:
      required:
        - correspondences
      type: object
      additionalProperties: false
      properties:
        investorId:
          type: string
          maxLength: 14
          readOnly: true
          description: Unique SS&C Wealth Platform Investor identifier
        tenantId:
          maxLength: 7
          type: string
          description: Unique SS&C Wealth Platform Tenant identifier
          format: string
          readOnly: true
          example: HUBWISE
        correspondences:
          type: array
          items:
            $ref: "#/components/schemas/VulnerabilityCorrespondence"
        declarations:
          writeOnly: true
          type: array
          items:
            $ref: "#/components/schemas/Declaration"

    VulnerabilityHeader:
      required:
        - vulnerabilities
      type: object
      additionalProperties: false
      properties:
        investorId:
          type: string
          maxLength: 14
          readOnly: true
          description: Unique SS&C Wealth Platform Investor identifier
        tenantId:
          maxLength: 7
          type: string
          description: Unique SS&C Wealth Platform Tenant identifier
          format: string
          readOnly: true
          example: HUBWISE
        vulnerabilities:
          type: array
          items:
            $ref: "#/components/schemas/Vulnerability"
        declarations:
          writeOnly: true
          type: array
          items:
            $ref: "#/components/schemas/Declaration"

    VulnerabilityCorrespondence:
      description: Duplicate correspondence and startDate not allowed.
      required:
        - type
      type: object
      additionalProperties: false
      properties:
        type:
          type: string
          description: >-
            The preferred correspondence format or access arrangement required by the investor to support effective communication and accessibility
          example: LARGE_PRINT
          enum:
            - AUDIO
            - BRAILLE
            - LARGE_PRINT
            - ERROR
        startDate:
          type: string
          description: Vulnerabilities start date (any date). Defaulted to current date if not provided.
          format: date
          example: "2025-01-01"
        expiryDate:
          type: string
          description: Vulnerabilities expiry date (must be after the start date)
          format: date
          example: "2026-01-01"
        adviserId:
          type: string
          maxLength: 14
          readOnly: true
          description: Unique SS&C Wealth Platform Adviser identifier

    Vulnerability:
      required:
        - type
        - serviceLevel
      description: Duplicate vulnerabilities, serviceLevel and startDate not allowed.
      type: object
      additionalProperties: false
      properties:
        type:
          type: string
          description: >-
            The category of vulnerability applicable to the investor
          example: HEALTH
          enum:
            - HEALTH
            - LIFE_EVENTS
            - RESILIENCE
            - CAPABILITY
        serviceLevel:
          type: string
          description: >-
            The service adjustment or support requirements needed to ensure fair
            and appropriate customer outcomes. These indicators guide how the
            firm should communicate with or support the investor
          example: ARRANGE_WRITTEN_CONFIRMATION_OF_ANY_DISCUSSIONS
          enum:
            - ALLOW_EXTRA_TIME_FOR_CUSTOMER_TO_ANSWER_PHONE
            - ARRANGE_WRITTEN_CONFIRMATION_OF_ANY_DISCUSSIONS
            - CLIENT_UNABLE_TO_USE_INTERNET
            - COLOURED_PAPER_BLUE
            - COLOURED_PAPER_CREAM
            - COLOURED_PAPER_LILAC
            - COLOURED_PAPER_YELLOW
            - DO_NOT_OUTBOUND_CALL
            - EMPATHY_NEEDED_FOR_CUSTOMER
            - ENGLISH_LANGUAGE_SUPPORT_REQUIRED
            - EXTRA_TIME_REQUIRED_TO_RESPOND_OR_COMPLETE_TASKS
            - LITERACY_OR_NUMERACY_SUPPORT_NEEDED
            - NONE_REQUIRED
            - ONLINE_SUPPORT_NEEDED
            - SPEAK_LOUDLY_AND_CLEARLY
            - SPEAK_SLOWLY_FOR_CLIENT
            - UNABLE_TO_COMPLETE_SECURITY_ALONE
            - USE_SIMPLIFIED_LANGUAGE
            - VARIED_CORRESPONDENCE_FORMAT
        startDate:
          type: string
          description: Vulnerabilities start date (any date). Defaulted to current date if not provided.
          format: date
          example: "2025-01-01"
        expiryDate:
          type: string
          description: Vulnerabilities expiry date (must be after the start date)
          format: date
          example: "2026-01-01"
        adviserId:
          type: string
          maxLength: 14
          readOnly: true
          description: Unique SS&C Wealth Platform Adviser identifier

    FeesHeader:
      required:
        - fees
      type: object
      additionalProperties: false
      properties:
        fees:
          type: array
          items:
            $ref: "#/components/schemas/Fee"
        declarations:
          writeOnly: true
          type: array
          items:
            $ref: "#/components/schemas/Declaration"

    Fee:
      description: Represents a fee against an account.
      required:
        - type
      type: object
      additionalProperties: false
      properties:
        id:
          format: int64
          description: SS&C Wealth Platform Account Fee identifier
          maximum: 99999
          minimum: 0
          type: integer
          readOnly: true
          example: 1
        accountId:
          description: Unique SS&C Wealth Platform Account identifier
          maxLength: 11
          minLength: 11
          type: string
          readOnly: true
          example: HW00013451A
        adviserId:
          description: Unique SS&C Wealth Platform Adviser identifier
          maxLength: 7
          minLength: 7
          type: string
          readOnly: true
          example: E000139
        tenantId:
          description: Unique SS&C Wealth Platform Tennant identifier
          maxLength: 7
          minLength: 7
          type: string
          readOnly: true
        type:
          description: The fee type
          enum:
            - ADVISER_ANNUAL
            - ADVISER_INITIAL
            - ADVISER_ONE_OFF
            - PORTFOLIO_MANAGEMENT
            - INVESTMENT_SERVICE
            - PRODUCT_ANNUAL
            - PLATFORM_ANNUAL
            - DISCRETIONARY_MANAGEMENT_ANNUAL
            - PLATFORM_INITIAL
          type: string
          example: ADVISER_ANNUAL
        status:
          description: The status of the fee
          enum:
            - ACTIVE
            - COMPLETED
            - ARCHIVED
          type: string
          readOnly: true
        code:
          description: Unique SS&C Wealth Platform Fee identifier
          maxLength: 6
          type: string
          example: AFGVCD
        amount:
          description: The fee amount for a fixed amount based fee
          type: number
        percentage:
          description: The percectage expressed as a decimal for a fixed percentage based fee
          maximum: 1
          exclusiveMaximum: false
          minimum: 0
          exclusiveMinimum: false
          type: number
          example: 0
        currency:
          description: currency of the fee, must match the accounts base currency
          maxLength: 3
          type: string
          example: GBP
        vatIncluded:
          description: If VAT is included in the fee
          type: boolean
          example: true
        startDate:
          format: date
          description: The date the fee starts
          type: string
          example: "2025-04-28"
        endDate:
          format: date
          description: The date the fee ends
          type: string
          example: "2025-05-28"
        method:
          description: The fee method
          default: IN_ADVANCE
          enum:
            - IN_ADVANCE
            - ARREARS
          type: string
          readOnly: true
        invoiceFrequency:
          description: The frequency of invoicing.
          enum:
            - ANNUALLY
            - MONTHLY
            - QUARTERLY
            - HALF_YEARLY
            - ONE_OFF
          type: string
          readOnly: true
        period:
          description: The frequency the fee is charged.
          enum:
            - ANNUALLY
            - MONTHLY
            - QUARTERLY
            - HALF_YEARLY
            - ONE_OFF
          type: string
          readOnly: true
        invoiceMinimumAmount:
          description: The minimum amount the charge can be per invoice
          maximum: 999999999.99
          type: number
          readOnly: true
          example: 123.45
        invoiceMaximumAmount:
          description: The maximum amount the charge can be per invoice
          maximum: 999999999.99
          type: number
          readOnly: true
          example: 9999.99
        bandDetails:
          $ref: "#/components/schemas/TieredFeeDetails"

    TieredFeeDetails:
      description: Detailed configuration for a banded fee structure.
      type: object
      readOnly: true
      additionalProperties: false
      properties:
        type:
          description: The banding method
          enum:
            - TIERED
            - CLIFF_EDGE
          type: string
          readOnly: true
        currency:
          description: currency of the fee, must match the accounts base currency
          maxLength: 3
          type: string
          example: GBP
        minimumAmount:
          description: The minimum amount the charge can be per period.
          maximum: 999999999.99
          type: number
          readOnly: true
          example: 123.45
        maximumAmount:
          description: The maximum amount the charge can be per period.
          maximum: 999999999.99
          type: number
          readOnly: true
          example: 9999.99
        description:
          description: The name of the fee
          maxLength: 35
          type: string
          readOnly: true
          example: Adviser Annual Tiered Fee
        bands:
          description: The details of each of the fee rate bands
          type: array
          items:
            $ref: "#/components/schemas/RateBand"
          readOnly: true

    RateBand:
      description: The details of a single rate band within a fee structure.
      type: object
      additionalProperties: false
      properties:
        currency:
          description: currency of the fee, must match the accounts base currency
          maxLength: 3
          type: string
          example: GBP
        amount:
          description: Fee amount for amount based fee
          type: number
        percentage:
          description: Percentage for percentage based fee
          maximum: 100
          exclusiveMaximum: false
          minimum: 0
          exclusiveMinimum: false
          type: number
          example: 0.75
        lower:
          description: The minimum threshold at which this band begins to apply.
          maximum: 999999999.99
          type: number
          readOnly: true
          example: 0
        upper:
          description: the maximum threshold at which this band stops applying.
          maximum: 999999999.99
          type: number
          readOnly: true
          example: 100000
    
    FeesHeaderPatch:
      required:
        - fees
      type: object
      additionalProperties: false
      properties:
        fees:
          type: array
          items:
            $ref: "#/components/schemas/FeePatch"
        declarations:
          writeOnly: true
          type: array
          items:
            $ref: "#/components/schemas/Declaration"

    FeePatch:
      description: Represents a fee being archived against an account.
      required:
        - endDate
      type: object
      additionalProperties: false
      properties:
        endDate:
          format: date
          description: The date the fee ends
          type: string
          example: "2025-05-28"

    CreateFeeGroupRequest:
      description: Request payload for creating a Fee Group.
      required:
        - groupId
        - feeType
        - feeCode
        - accounts
      type: object
      additionalProperties: false
      properties:
        groupId:
          description: User-supplied Fee Group identifier. Must be unique per tenant.
          maxLength: 11
          minLength: 1
          type: string
          example: SMITHSPLT01
        feeType:
          description: The fee type associated with the group. Must match the fee qualification of every account being added.
          type: string
          enum:
            - ADVISER_ANNUAL
            - ADVISER_INITIAL
            - ADVISER_ONE_OFF
            - PORTFOLIO_MANAGEMENT
            - INVESTMENT_SERVICE
            - PRODUCT_ANNUAL
            - PLATFORM_ANNUAL
            - PLATFORM_INITIAL
            - DISCRETIONARY_MANAGEMENT_ANNUAL
          example: PLATFORM_ANNUAL
        feeCode:
          description: A fee code identifying an existing set of tiered rates. Must match the fee qualification of every account being added.
          maxLength: 6
          minLength: 1
          type: string
          example: SA0001
        accounts:
          description: List of investment accounts to add to the Fee Group. At least one account is required.
          minItems: 1
          type: array
          items:
            $ref: "#/components/schemas/FeeGroupAccountRequest"

    UpdateFeeGroupRequest:
      description: Request payload for updating a Fee Group by adding and/or removing member accounts.
      type: object
      additionalProperties: false
      properties:
        operations:
          description: An ordered list of add and/or delete operations. Operations are applied in array order within a single transaction. The server requires at least one operation; an empty or missing array is rejected with `HWA-FEE-GROUP-008`.
          type: array
          items:
            $ref: "#/components/schemas/FeeGroupAction"

    FeeGroupAction:
      description: A single add or delete operation against a Fee Group.
      required:
        - action
        - accounts
      type: object
      additionalProperties: false
      properties:
        action:
          description: >-
            The operation to perform on the listed accounts.
            <ul>
            <li>add: Adds the listed accounts to the Fee Group.</li>
            <li>delete: Removes the listed accounts from the Fee Group.</li>
            </ul>
          enum:
            - add
            - delete
          type: string
          example: add
        accounts:
          description: The accounts targeted by this operation. At least one account is required.
          minItems: 1
          type: array
          items:
            $ref: "#/components/schemas/FeeGroupAccountRequest"

    FeeGroupAccountRequest:
      description: An account being referenced in a Fee Group create or update request.
      required:
        - id
      type: object
      additionalProperties: false
      properties:
        id:
          description: Unique SS&C Wealth Platform Account identifier.
          maxLength: 11
          minLength: 1
          type: string
          example: HW04003258A

    FeeGroupResponse:
      description: A Fee Group and its current member accounts.
      type: object
      additionalProperties: false
      properties:
        groupId:
          description: User-supplied Fee Group identifier.
          maxLength: 11
          type: string
          readOnly: true
          example: SMITHSPLT01
        status:
          description: The current status of the Fee Group.
          enum:
            - ACTIVE
            - INACTIVE
          type: string
          readOnly: true
          example: ACTIVE
        feeType:
          description: The fee type associated with the group.
          enum:
            - ADVISER_ANNUAL
            - ADVISER_INITIAL
            - ADVISER_ONE_OFF
            - PORTFOLIO_MANAGEMENT
            - INVESTMENT_SERVICE
            - PRODUCT_ANNUAL
            - PLATFORM_ANNUAL
            - PLATFORM_INITIAL
            - DISCRETIONARY_MANAGEMENT_ANNUAL
          type: string
          readOnly: true
          example: PLATFORM_ANNUAL
        feeCode:
          description: The fee code identifying the set of tiered rates for this group.
          maxLength: 6
          type: string
          readOnly: true
          example: SA0001
        accounts:
          description: Member accounts of the Fee Group, with enriched details.
          type: array
          readOnly: true
          items:
            $ref: "#/components/schemas/FeeGroupAccountResponse"

    FeeGroupAccountResponse:
      description: A member account of a Fee Group, including enriched details from the account master.
      type: object
      additionalProperties: false
      properties:
        id:
          description: Unique SS&C Wealth Platform Account identifier.
          maxLength: 11
          type: string
          readOnly: true
          example: HW04003258A
        name:
          description: The account name.
          maxLength: 50
          type: string
          readOnly: true
          example: Mr John Smith
        productId:
          description: Unique SS&C Wealth Platform Product identifier.
          maxLength: 3
          type: string
          readOnly: true
          example: HIS

    MovementsHeader:
      required:
        - moneyMovements
      type: object
      additionalProperties: false
      properties:
        moneyMovements:
          type: array
          items:
            $ref: "#/components/schemas/Movement"
        declarations:
          writeOnly: true
          type: array
          items:
            $ref: "#/components/schemas/Declaration"
      
    MovementsHeaderPatch:
      required:
        - moneyMovements
      type: object
      additionalProperties: false
      properties:
        moneyMovements:
          type: array
          items:
            $ref: "#/components/schemas/MovementPatch"
        declarations:
          writeOnly: true
          type: array
          items:
            $ref: "#/components/schemas/Declaration"

    Movement:
      description: money movements in and out of an account
      required:
        - type
        - frequency
        - bank
        - payer
      type: object
      additionalProperties: false
      properties:
        id:
          format: int64
          description: SS&C Wealth Platform Movement identifier
          type: integer
          readOnly: true
          example: 2
        accountId:
          format: string
          description: Unique SS&C Wealth Platform Account identifier
          maxLength: 11
          minLength: 11
          type: string
          readOnly: true
          example: HW00013451A
        tenantId:
          format: string
          description: Unique SS&C Wealth Platform Tenant identifier
          maxLength: 7
          minLength: 7
          type: string
          readOnly: true
          example: HUBWISE
        adviserId:
          format: string
          description: Unique SS&C Wealth Platform Adviser identifier
          maxLength: 7
          minLength: 7
          readOnly: true
          type: string
          example: E273053
        status:
          description: The status of the movement
          enum:
            - ACTIVE
            - NEW
            - COMPLETED
            - PENDING
            - ARCHIVED
          type: string
          readOnly: true
          example: ACTIVE
        type:
          description: >-
            The type of money movement being specified, the API can support payments into and out
            of the account. WITHDRAWALS are only valid for non pension products. UFPLS,
            FLEXI_ACCESS_INCOME, and FLEXI_ACCESS_PCLS are only valid for pension products.
            UFPLS does not support `isMaximum`; use a specific `value` instead.
          enum:
            - CONTRIBUTIONS
            - WITHDRAWALS
            - UFPLS
            - FLEXI_ACCESS_INCOME
            - FLEXI_ACCESS_PCLS
          type: string
          example: CONTRIBUTIONS
        contributionMethod:
          description: >-
            The chosen payment method for the contribution money movement. This is mandatory if
            type is contribution.
          enum:
            - ELECTRONIC
            - CHEQUE
            - DIRECT_DEBIT
          type: string
          example: ELECTRONIC
        payer:
          description: >-
            Whether the payment is being made by the individual owner(s) of the account or an
            employer on their behalf. Employer contributions are only applicable to pension
            products. Defaulted to SELF if not provided.
          enum:
            - SELF
            - EMPLOYER
          type: string
          example: SELF
        frequency:
          description: >-
            The frequency of this specific money movement. One Off Direct Debit contributions are
            not supported. Single Withdrawals are not supported at onboarding, but can be added
            once the account is active.
          enum:
            - ANNUALLY
            - MONTHLY
            - QUARTERLY
            - HALF_YEARLY
            - ONE_OFF
          type: string
          example: ONE_OFF
        nextDate:
          format: date
          description: >-
            The initial date or next date for the money movement. 
          type: string
          example: "2025-01-22"
        endDate:
          format: date
          description: >-
            The date on which the movement is intended to cease, this would be used, for example,
            for regular withdrawals or drawdown arrangements.
          type: string
        reference:
          description: >-
            A reference which can  be provided, if not provided it will be generated for a Direct
            Debit
          type: string
          maxLength: 14
          example: HW000134514
        isMaximum:
          description: >-
            Indicates the maximum allowable amount. Can only be used for WITHDRAWAL, FLEXI_ACCESS_INCOME,
            and FLEXI_ACCESS_PCLS. 


            For FLEXI_ACCESS_INCOME and FLEXI_ACCESS_PCLS, this field may be set to `true` to request the full maximum PCLS
            entitlement and a numeric value can also be specified.
          anyOf:
            - type: boolean
            - type: number
              format: double
        includeNonDailyAssets:
          description: >-
            Allows a customer to indicate if they want to include or exclude non-daily traded assets from one off contributions and withdrawals. Defaults to false for one off contributions and true for one off withdrawals.
          type: boolean
        copyP45Provided:
          description: >-
            Where any drawdown event is selected, a copy of the investor's P45 is required to ensure
            the correct tax code is applied. Only applicable for UFPLS or FLEXI_ACCESS_INCOME.
          default: false
          type: boolean
        investmentInstruction:
          description: >-
            The choice of whether to invest immediately into a model or hold in cash for a
            contribution.
          enum:
            - LEAVE_IN_CASH
            - INVEST_IN_MODEL
          type: string
          example: INVEST_IN_MODEL
        thirdPartyId:
          description: SS&C Wealth Platform third party identifier
          maxLength: 2
          minLength: 1
          type: string
          example: "1"
        value:
          $ref: "#/components/schemas/Value"
        bank:
          $ref: "#/components/schemas/BankAccountDetails"
        fee:
          $ref: "#/components/schemas/MovementFee"
        hmrcProtection:
          $ref: "#/components/schemas/HMRCProtection"
        sourceOfFunds:
          $ref: "#/components/schemas/SourceOfFunding"
        allocations:
          description: >-
            MIS sub-account allocation splits for this movement. Applies to CONTRIBUTIONS and to
            disinvestments (WITHDRAWALS, UFPLS, FLEXI_ACCESS_PCLS, FLEXI_ACCESS_INCOME) on Multiple
            Investment Strategy (MIS) accounts. When provided, the percentages must sum to 100 and
            each sub-account must be unique. When omitted for a MIS account, the default allocation
            held against the primary account is used. Ignored for non-MIS accounts. Returned in the
            response when present.
          type: array
          items:
            $ref: "#/components/schemas/MovementAllocation"

    MovementPatch:
      description: patch regular money movements in and out of an account
      type: object
      additionalProperties: false
      properties:
        frequency:
          description: >-
            The frequency of this specific money movement. One Off Direct Debit contributions are
            not supported. Single Withdrawals are not supported at onboarding, but can be added
            once the account is active.
          enum:
            - ANNUALLY
            - MONTHLY
            - QUARTERLY
            - HALF_YEARLY
            - ONE_OFF
          type: string
          example: ONE_OFF
        nextDate:
          format: date
          description: >-
            The collection or withdrawal date for this movement. Mandatory if the frequency is not
            ONE_OFF.
          type: string
          example: "2025-01-22"
        endDate:
          format: date
          description: >-
            The date on which the movement is intended to cease, this would be used, for example,
            for regular withdrawals or drawdown arrangements.
          type: string
        payer:
          description: >-
            Indicates who the payer is; typically SELF or EMPLOYER. Defaults to SELF if not
            supplied.
          enum:
            - SELF
            - EMPLOYER
          type: string
          example: SELF
        value:
          $ref: "#/components/schemas/ValuePatch"
        bank:
          $ref: "#/components/schemas/BankAccountDetails"
        fee:
          $ref: "#/components/schemas/MovementFeeUpdate"

    MovementFeeUpdate:
      description: >-
        Partial fee update for an existing movement. Only amount, percentage and instalmentPlan can
        be changed.
      type: object
      additionalProperties: false
      properties:
        amount:
          description: Fixed fee amount (in currency).
          type: number
          example: 100.00
        percentage:
          description: Fee as a percentage (e.g. 0.75 = 0.75%).
          type: number
          example: 0.75
        instalmentPlan:
          $ref: "#/components/schemas/FeeInstalmentPlan"

    MovementAllocation:
      description: >-
        Allocation of a money movement across a sub-account of a Multiple Investment Strategy (MIS)
        account. When provided, each entry references a valid sub-account of the primary account and
        all percentages must sum to exactly 100. Each sub-account may appear once. When omitted for a
        MIS account, the default allocation held against the primary account is used. Ignored for
        non-MIS accounts.
      required:
        - accountId
        - percentage
      type: object
      additionalProperties: false
      properties:
        accountId:
          format: string
          description: The SS&C Wealth Platform Account identifier of the MIS sub-account.
          maxLength: 11
          minLength: 11
          type: string
          example: HW00013451B
        percentage:
          type: number
          format: double
          description: >-
            The percentage of the movement to allocate to this sub-account. All allocation
            percentages must sum to 100.
          minimum: 0
          maximum: 100
          example: 20

    Value:
      description: >-
        Value object representing amounts and currency. This is mandatory for money movements unless
        isMaximum is true and type is WITHDRAWAL, FLEXI_ACCESS_INCOME, or FLEXI_ACCESS_PCLS
      required:
        - amount
        - currency
      type: object
      additionalProperties: false
      properties:
        amount:
          format: double
          description: Value of the money movement or transfer
          type: number
          example: 15000
        currency:
          description: currency of the money movement or transfer, must match the accounts base currency
          maxLength: 3
          type: string
          example: GBP
        crystallised:
          description: Crystallised value being transferred
          type: number
        uncrystallised:
          description: Uncrystallised value being transferred
          type: number
          readOnly: true
    
    ValuePatch:
      description: >-
        Value object representing amounts.
      required:
        - amount
      type: object
      additionalProperties: false
      properties:
        amount:
          format: double
          description: Value of the money movement or transfer
          type: number
          example: 15000

    MovementFee:
      allOf:
        - $ref: '#/components/schemas/TransferFee'
        - type: object
          properties:
            instalmentPlan:
              $ref: "#/components/schemas/FeeInstalmentPlan"

    TransferFee:
      description: Represents a fee charged to an account for a movement or transfer
      type: object
      properties:
        id:
          format: int64
          description: Unique identifier for the fee record.
          maximum: 99999
          minimum: 0
          type: integer
          readOnly: true
          example: 1
        type:
          description: fee type
          enum:
            - ADVISER_INITIAL
          type: string
          readOnly: true
          example: ADVISER_INITIAL
        amount:
          description: Fee amount for amount based fee
          type: number
          example: 5
        percentage:
          description: Percentage for percentage based fee
          maximum: 100
          exclusiveMaximum: false
          minimum: 0
          exclusiveMinimum: false
          type: number
          example: 5

    FeeInstalmentPlan:
      description: >-
        Represents a monthly installment plan for charging a fee into multiple parts for direct
        debits
      type: object
      additionalProperties: false
      properties:
        totalMonths:
          format: int64
          description: Total number of installments in the plan.
          maximum: 999
          type: integer
          example: 12
        completedMonths:
          format: int64
          description: Number of installments already completed.
          maximum: 999
          type: integer
          readOnly: true
          example: 5

    HMRCProtection:
      description: Represents  HRMC protection rules for a pension product. Only applicable for pension products.
      type: object
      additionalProperties: false
      properties:
        type:
          description: >-
            The type of HMRC protection which applies to this account. Mandatory where HMRC
            protection is true
          enum:
            - ENHANCED_PROTECTION
            - PRIMARY_PROTECTION
            - FIXED_PROTECTION
            - FIXED_PROTECTION_2014
            - FIXED_PROTECTION_2016
            - INDIVIDUAL_PROTECTION_2014
            - INDIVIDUAL_PROTECTION_2016
          type: string
        certificateNumber:
          description: >-
            The unique reference issued by HMRC for the protection afforded to this pension
            account.
          maxLength: 30
          type: string
          example: FP161234567890A

    SourceOfFunding:
      description: This provides details explaining the source of funds. Only applicable for one-off self contributions for retail accounts.
      type: object
      additionalProperties: false
      properties:
        id:
          description: Unique identifier for the source of fund record.
          maximum: 99999
          type: integer
          readOnly: true
        type:
          description: the Source of Fund type for one off contributions
          enum:
            - DIVIDENDS_OR_COMPANY_PROFITS
            - DIVORCE
            - EARNINGS
            - GIFT
            - INHERITANCE
            - INSURANCE_CLAIMS
            - LOAN
            - LOTTERY_OR_GAMBLING_WIN
            - MATURITY_OR_SURRENDER_OF_LIFE_ASSURANCE
            - OTHER
            - OTHER_COURT_AWARD
            - SALE_OF_INVESTMENTS
            - SALE_OF_PROPERTY_OR_BUSINESS
            - SAVINGS
          type: string
          example: DIVIDENDS_OR_COMPANY_PROFITS
        fields:
          $ref: "#/components/schemas/SourceOfFundingFields"

    SourceOfFundingFields:
      description: Optional fields that can be provided based on the source of funds type
      type: object
      additionalProperties: false
      properties:
        annualSalary:
          description: Optional when type is EARNINGS
          type: number
        jobDescription:
          description: Optional when type is EARNINGS
          type: string
          maxLength: 250
        natureOfBusiness:
          description: Optional when type is EARNINGS
          type: string
          maxLength: 250
        amountReceived:
          description: "Optional when type is DIVIDENDS_OR_COMPANY_PROFITS, DIVORCE, GIFT, INHERITANCE"
          type: number
          example: 15000
        frequency:
          description: Optional when type is DIVIDENDS_OR_COMPANY_PROFITS
          type: string
          example: ANNUALLY
          maxLength: 250
        donorName:
          description: Optional when type is GIFT
          type: string
          maxLength: 250
        dateReceived:
          format: date
          description: Optional when type is INHERITANCE
          type: string
        benefactorName:
          description: Optional when type is INHERITANCE
          type: string
          maxLength: 250
        relationshipToBenefactor:
          description: Optional when type is INHERITANCE
          type: string
          maxLength: 250
        claimValue:
          description: Optional when type is INSURANCE_CLAIMS
          type: number
        providerName:
          description: >-
            Optional when type is INSURANCE_CLAIMS, MATURITY_OR_SURRENDER_OF_LIFE_ASSURANCE,
            SAVINGS
          type: string
          maxLength: 250
        natureOfClaim:
          description: Optional when type is INSURANCE_CLAIMS
          type: string
          maxLength: 250
        loanValue:
          description: Optional when type is LOAN
          type: number
        lenderName:
          description: Optional when type is LOAN
          type: string
          maxLength: 250
        winValue:
          description: Optional when type is LOTTERY_OR_GAMBLING_WIN
          type: number
        sourceOfWinnings:
          description: Optional when type is LOTTERY_OR_GAMBLING_WIN
          type: string
          maxLength: 250
        maturityOrSurrenderValue:
          description: Optional when type is MATURITY_OR_SURRENDER_OF_LIFE_ASSURANCE
          type: number
        awardValue:
          description: Optional when type is OTHER_COURT_AWARD
          type: number
        natureOfAward:
          description: Optional when type is OTHER_COURT_AWARD
          type: string
          maxLength: 250
        dateOfSale:
          format: date
          description: "Optional when type is SALE_OF_INVESTMENTS, SALE_OF_PROPERTY_OR_BUSINESS"
          type: string
        investmentType:
          description: Optional when type is SALE_OF_INVESTMENTS
          type: string
          maxLength: 250
        investmentHoldingPeriod:
          description: Optional when type is SALE_OF_INVESTMENTS
          type: string
          maxLength: 250
        saleAmount:
          description: Optional when type is SALE_OF_PROPERTY_OR_BUSINESS
          type: number
        natureOfPropertyOrBusiness:
          description: Optional when type is SALE_OF_PROPERTY_OR_BUSINESS
          type: string
          maxLength: 205
        sourceOfSavings:
          description: Optional when type is SAVINGS
          type: string
          maxLength: 250
        description:
          description: Optional when type is OTHER
          type: string
          maxLength: 205

    InterAccountTransfersHeader:
      additionalProperties: false
