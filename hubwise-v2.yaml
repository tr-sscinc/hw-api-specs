components:
  
  parameters:
    Request-Id: 
      name: Request-Id
      in: header
      description: |
        Uniquely identifies a HTTP request. 
        
        
        Can be provided by the caller, or if the caller does not provide it, it will be generated by the server and returned to the caller once the request has been processed.
      required: false
      schema:
        type: string
        format: uuid
      example: 5cc9dc98-c5a4-481d-bd3b-3c0d3af67c25

  headers:
    Request-Id:
      description: |
        Uniquely identifies a HTTP request. 
        
        
        Can be provided by the caller, or if the caller does not provide it, it will be generated by the server and returned to the caller once the request has been processed. 
      required: false
      schema:
        type: string
        format: uuid
      example: 5cc9dc98-c5a4-481d-bd3b-3c0d3af67c25
  
  schemas:
    Error:
      type: object
      description: A standard error response.
      required:
        - errorCode
        - message
      additionalProperties: false
      properties:
        errorCode:
          type: string
          maxLength: 25
          description: Application-specific error code that uniquely identifies the error.
        message:
          type: string
          maxLength: 2000
          description: Human-readable error message providing more context about the error.
        errors:
          type: array
          items:
            $ref: "#/components/schemas/ValidationFailure"

    ValidationFailure:
      type: object
      description: |
        If applicable, describes a single request validation failure.
      required:
        - message
      additionalProperties: false
      properties:
        field:
          description: |
            The exact data which caused the validation failure. 
            
            For example: 
            
            - *investorId* in the path,
            - *details.bankReferenceType* in the request body,
            - *X-API-KEY* in the headers collection
            
            If a request body is passed, this field can contain the JSON Path expression pointing to the value in the request body which caused the validation failure.

            The RFC standard for JSON Path: https://www.rfc-editor.org/rfc/rfc9535.html
          type: string
          maxLength: 250
        resource:
          type: string
          maxLength: 100
          description: |-
            The part of the request which caused the problem. 
            
            Can be one of: 
            
             - path
             - query
             - header
             - body
             
        message:
          type: string
          maxLength: 2000
          description: Detailed message about the request validation failure.

    ExternalReference:
      type: object
      required:
        - reference
        - provider
      additionalProperties: false
      properties:
        reference:
          format: string
          description: third party reference
          maxLength: 36
          minLength: 1
          type: string
          example: d8d3a6b1-f1e5-4b0a-8d2c-0a3f5b7e9d1c
        provider:
          format: string
          description: provider of the reference
          maxLength: 36
          minLength: 1
          type: string
          example: CRM Name

    Address:
      additionalProperties: false
      required:
        - countryCode
        - line1
        - postCode
        - premisesIdentifier
        - primary
        - town
      type: object
      properties:
        id:
          type: integer
          description: Id
          format: int64
          readOnly: true
          example: 1
        primary:
          type: boolean
          description: Primary
          example: true
        premisesIdentifier:
          maxLength: 75
          minLength: 0
          type: string
          description: Premises Identifier
          example: "12"
        line1:
          maxLength: 75
          minLength: 0
          type: string
          description: Address line 1
          example: Rosewood Cottage
        line2:
          maxLength: 75
          minLength: 0
          type: string
          description: Address line 2
          example: Elm Street
        town:
          maxLength: 75
          minLength: 0
          type: string
          description: Town or city
          example: Hightown
        county:
          maxLength: 75
          minLength: 0
          type: string
          description: County
          example: Lancashire
        postCode:
          maxLength: 12
          minLength: 0
          type: string
          description: Postcode
          example: HT3 4AB
        countryCode:
          maxLength: 3
          minLength: 0
          type: string
          description: Country code
          example: GB

    Declaration:
      type: object
      additionalProperties: false
      properties:
        templateId:
          description: Unique SS&C Hubwise Template identifier
          maxLength: 50
          type: string
          example: TEMPLATE_ID_VALUE
        adviserId:
          format: string
          description: Unique SS&C Hubwise Adviser identifier assigned to the declaration
          maxLength: 7
          minLength: 7
          type: string
          example: E273053
        acknowledgement:
          description: To determine if the declaration has been read and agreed
          type: boolean
          example: true
        acknowledgementReason:
          description: The declaration acknowledgement reason, if the decalaration has not been agreed
          type: string
          maxLength: 500

    Allowance:
      additionalProperties: false
      type: object
      readOnly: true
      properties:
        remainingAllowance:
          type: number
          description: the investors remaining allowance in current tax year
          readOnly: true
          example: 20000
        subscribedAmount:
          type: number
          description: The amoune the investor has subscribed in current tax year
          readOnly: true
          example: 0
      description: The investor allowance information for the current tax year for and ISA or JISA

    ContactDetails:
      type: object
      additionalProperties: false
      properties:
        contactPhone:
          maxLength: 20
          minLength: 0
          type: string
          description: Contact Phone
          format: string
          example: "01619465555"
        homePhone:
          maxLength: 20
          minLength: 0
          type: string
          description: Home Phone
          format: string
          example: "01619464444"
        mobilePhone:
          maxLength: 20
          minLength: 0
          type: string
          description: Mobile Phone
          format: string
          example: "07877156340"
        email:
          maxLength: 256
          minLength: 1
          type: string
          description: email address for notifications
          format: string
          example: john.doe@outlook.com

