  /accounts/{accountId}/income-options:

    put:
      tags:
        - Accounts
      summary: Add or update an income option on an investment account
      description: >-
        An adviser should be able to manage how investment income for an investment account is handled by SS&C Wealth Platform. 

        The income for an account can be:

          - Kept in cash

          - Reinvested in the account's portfolio

          - Withdrawn to a bank account

      operationId: createOrModifyIncomeOption
      parameters:
        - $ref: '#/components/parameters/Request-Id'
        - name: accountId
          in: path
          description: Unique SS&C Wealth Platform Account identifier
          required: true
          schema:
            type: string
            maxLength: 11
          example: HW00013451A
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IncomeOptionHeader"
            examples:
              Ex1:
                summary: Keep income as cash.
                value:
                  {
                    "incomeOption": { 
                      "type": "CASH"
                    }
                  }
              Ex2:
                summary: Reinvest income in account portfolio.
                value:
                  {
                    "incomeOption": { 
                      "type": "REINVEST",
                      "reinvestmentDate": "2026-01-07"
