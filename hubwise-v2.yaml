                  value:
                    {
                        "fees": [
                          {
                            "id": 1,
                            "accountId": "HW04003258A",
                            "adviserId": "E008469",
                            "tenantId": "HUBWISE",
                            "type": "ADVISER_ANNUAL",
                            "status": "ACTIVE",
                            "code": "AFGVCD",
                            "vatIncluded": true,
