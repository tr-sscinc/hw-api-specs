  /investors/{investorId}/correspondences:
    
    post:
      tags:
        - Investors
      summary: Create an investors correspondences
      description: >
        Creates one or more correspondence preference records for an existing investor.
        
        
        This endpoint applies only to investors of type Individual or Court Appointed Deputy and requires the SS&C Hubwise Investor ID generated during investor creation.
        
        
        This endpoint should be used when creating new correspondence records against an existing investor. Each correspondence record must be provided in the request. If a start date is not supplied, it will default to the current date.
        
        
        If correspondence preferences already exist for the investor, the update endpoint must be used
        
        
        The endpoint must be called once per investor record.

      operationId: createInvestorCorrespondences
      parameters:
        - $ref: '#/components/parameters/Request-Id'
        - name: investorId
          in: path
          description: Unique SS&C Hubwise Investor identifier
          required: true
          schema:
            type: string
            maxLength: 14
          example: HWI04003219
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CorrespondenceHeader"
            examples:
              Ex1:
                summary: Investor correspondences
                value:
                  {
                    "correspondences":
                      [
                        {
                          "type": "AUDIO",
                          "startDate": "2025-10-01",
                          "expiryDate": "2025-10-22"
                        },
                        { 
                          "type": "BRAILLE", 
                          "startDate": "2025-10-01" 
                        }
                      ],
                    "declarations":
                      [
                        {
                          "adviserId": "E273053",
                          "templateId": "CONFIRM_CORRESPONDENCES_CONSENT",
                          "acknowledgement": true
                        }
                      ]
                  }
        required: true
      responses:
