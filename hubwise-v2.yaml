  /accounts/{accountId}/fees:
    
    post:
      tags:
        - Accounts
      summary: Create account fee(s)
      description: >-
        Creates one or more fee records for a single investment account.
        

        This endpoint should be used when adding fees to an account. Supported fee types are defined in the API schema.
        
        
        The following fee types are automatically configured by the system and cannot be created or modified via the API:
        
        
        1.	Product Annual
        
        
        2.	Platform Annual
       
       
        3.	Platform Initial
        
        
        4.	Discretionary Model Management
        
        
        Fees associated with money movements or transfers must be created and maintained using the money movement or transfer endpoints.
       
       
        If a fee code is supplied, the corresponding fee code details will be returned in the response under the band details section.
       
       
        The account record must exist before creating fee records.


      operationId: createAccountFees
      parameters:
        - $ref: '#/components/parameters/Request-Id'
        - name: accountId
          in: path
          description: Unique SS&C Wealth Platform Account identifier
          required: true
          schema:
            type: string
            maxLength: 14
          example: HW00013451A
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FeesHeader"
            examples:
              Ex1:
                summary: Add a banded annual adviser fee to the account.
                value: 
                  {
                    "fees": [
                      {
                        "type": "ADVISER_ANNUAL",
                        "code": "AFGVCD",
                        "vatIncluded": true,
                        "startDate": "2025-04-28"
                      }
                    ],
                    "declarations": [
                      {
                        "templateId": "AMENDMENT_CONSENT",
                        "adviserId": "E008469",
                        "acknowledgement": true
                      }
                    ]
                  }
              Ex2:
