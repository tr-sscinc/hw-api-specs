components:
  
  parameters:
    Request-Id: 
      name: Request-Id
      in: header
      description: |
        Uniquely identifies a HTTP request. 
        
        
        Can be provided by the caller, or if the caller does not provide it, it will be generated by the server and returned to the caller once the request has been processed.
      required: false
      schema:
        type: string
        format: uuid
      example: 5cc9dc98-c5a4-481d-bd3b-3c0d3af67c25

  headers:
    Request-Id:
      description: |
        Uniquely identifies a HTTP request. 
        
        
        Can be provided by the caller, or if the caller does not provide it, it will be generated by the server and returned to the caller once the request has been processed. 
      required: false
      schema:
        type: string
        format: uuid
      example: 5cc9dc98-c5a4-481d-bd3b-3c0d3af67c25
  
  schemas:
    Error:
      type: object
      description: A standard error response.
      required:
        - errorCode
        - message
      additionalProperties: false
      properties:
        errorCode:
          type: string
          maxLength: 25
          description: Application-specific error code that uniquely identifies the error.
        message:
          type: string
          maxLength: 2000
          description: Human-readable error message providing more context about the error.
        errors:
          type: array
          items:
            $ref: "#/components/schemas/ValidationFailure"

    ValidationFailure:
      type: object
      description: |
        If applicable, describes a single request validation failure.
      required:
        - message
      additionalProperties: false
      properties:
        field:
          description: |
            The exact data which caused the validation failure. 
            
            For example: 
            
            - *investorId* in the path,
            - *details.bankReferenceType* in the request body,
            - *X-API-KEY* in the headers collection
            
            If a request body is passed, this field can contain the JSON Path expression pointing to the value in the request body which caused the validation failure.

            The RFC standard for JSON Path: https://www.rfc-editor.org/rfc/rfc9535.html
          type: string
          maxLength: 250
        resource:
          type: string
          maxLength: 100
          description: |-
            The part of the request which caused the problem. 
            
            Can be one of: 
            
             - path
             - query
             - header
             - body
             
        message:
          type: string
          maxLength: 2000
          description: Detailed message about the request validation failure.

    Account:
      additionalProperties: false
      description: Account Model
      required:
        - productId
        - type
        - baseCurrency
        - marketSettlementCurrency
        - name
        - investors
        - model
      type: object
      properties:
        id:
          format: string
          description: Unique SS&C Hubwise Account identifier
          maxLength: 11
          minLength: 11
          type: string
          readOnly: true
          example: HW00013451A
        status:
          description: Current state of the account
          enum:
            - ACTIVE
            - REFERRED
            - DELETED
            - AWAITING_AUTHORISATION
            - SUSPENDED
            - PENDING
            - AWAITING_AML_CHECK
            - DECEASED
            - TRADING_SUSPENDED
            - UNDER_PROBATE
            - INTENTION_TO_CLOSE
            - TRANSFER_OUT_STOCK
            - RECENTLY_OPENED
            - FROZEN
            - CLOSED
            - ARCHIVED
            - TRANSFER_OUT_CASH
            - NON_UK_RESIDENT
            - AML
            - CLOSED_SUB_ACCOUNT
          type: string
          readOnly: true
        activationDate:
          format: date
          description: The date the account was activated
          type: string
          readOnly: true
        tenantId:
          format: string
          description: SS&C Hubwise tenant ID
          maxLength: 7
          minLength: 7
          type: string
          readOnly: true
        productId:
          format: string
          description: Unique SS&C Hubwise Product identifier
          maxLength: 3
          minLength: 3
          type: string
          example: HIS
        type:
          description: The level of service provided on an account
          enum:
            - ADVISED
            - DISCRETIONARY
            - EXECUTION_ONLY
          type: string
        adviserId:
          format: string
          description: Unique SS&C Hubwise Adviser identifier
          maxLength: 7
          minLength: 7
          type: string
          example: E273053
        baseCurrency:
          format: string
          description: The currency used  to record the accounts holdings historical cost
          maxLength: 3
          minLength: 3
          type: string
          example: GBP
        marketSettlementCurrency:
          format: string
          description: >-
            The currency funds are paid and received by the buyer and seller when the transaction
            is completed (settled)
          maxLength: 3
          minLength: 3
          type: string
          example: GBP
        name:
          format: string
          description: "The name of the account, usually set to the investor(s) name(s)"
          maxLength: 50
          minLength: 1
          type: string
          example: Mr Hubwise Person
        externalReferences:
          type: array
          items:
            $ref: "#/components/schemas/ExternalReference"
        investors:
          type: array
          items:
            $ref: "#/components/schemas/LinkedInvestor"
        pensionDetails:
          $ref: "#/components/schemas/AccountPension"
        model:
          $ref: "#/components/schemas/ModelHeader"
        declarations:
          writeOnly: true
          type: array
          items:
            $ref: "#/components/schemas/Declaration"
        bankAccounts:
          readOnly: true
          type: array
          items:
            $ref: "#/components/schemas/BankAccount"
        incomeOption:
          $ref: "#/components/schemas/IncomeOption"

    AccountPatch:
      description: Account Patch Model
      required:
        - name
      properties:
        name:
          format: string
          description: "The name of the account, usually set to the investor(s) name(s)"
          maxLength: 50
          minLength: 1
          type: string
          example: Mr Hubwise Person

    ExternalReference:
      type: object
      required:
        - reference
        - provider
      additionalProperties: false
      properties:
        reference:
          format: string
          description: third party reference
          maxLength: 36
          minLength: 1
          type: string
          example: d8d3a6b1-f1e5-4b0a-8d2c-0a3f5b7e9d1c
        provider:
          format: string
          description: provider of the reference
          maxLength: 36
          minLength: 1
          type: string
          example: CRM Name

    AccountPension:
      additionalProperties: false
      description: >-
        pension details, this array is mandatory for a pension product and not supported for non
        pension products
      required:
        - employmentStatus
        - taxReliefEntitlement
        - retirementAge
      type: object
      properties:
        employmentStatus:
          description: Status of employment of the owner investor linked to the account
          enum:
            - EMPLOYED
            - UNEMPLOYED
            - SELF_EMPLOYED
            - STUDENT
            - PENSIONER
            - CHILD
            - CARER
            - CHILD_CARER
            - RETIRED
            - OTHER
          type: string
        employmentStatusOther:
          format: string
          description: Status of employment free text if the employmentStatus is OTHER
          maxLength: 50
          minLength: 1
          type: string
        taxReliefEntitlement:
          format: string
          description: Tax relief eligibility of the owner investor linked to the account
          enum:
            - UK_RELEVANT_EARNINGS
            - UK_RESIDENT
            - OVERSEAS_CROWN_EMPLOYMENT_NO_UK_TAXABLE_EARNINGS
            - SPOUSE_OVERSEAS_CROWN_EMPLOYMENT_UK_TAXABLE_EARNINGS
            - NONE
          type: string
        retirementAge:
          format: int32
          description: The age the owner investor linked to the account plans to retire
          type: integer
        mpaaTriggeredDate:
          format: date
          description: >-
            The date MPAA was triggered for the owner investor linked to the account, if
            applicable
          type: string
          example: "2020-04-28"

    Address:
      additionalProperties: false
      required:
        - countryCode
        - line1
        - postCode
        - premisesIdentifier
        - primary
        - town
      type: object
      properties:
        id:
          type: integer
          description: Id
          format: int64
          readOnly: true
          example: 1
        primary:
          type: boolean
          description: Primary
          example: true
        premisesIdentifier:
          maxLength: 75
          minLength: 0
          type: string
          description: Premises Identifier
          example: "12"
        line1:
          maxLength: 75
          minLength: 0
          type: string
          description: Address line 1
          example: Rosewood Cottage
        line2:
          maxLength: 75
          minLength: 0
          type: string
          description: Address line 2
          example: Elm Street
        town:
          maxLength: 75
          minLength: 0
          type: string
          description: Town or city
          example: Hightown
        county:
          maxLength: 75
          minLength: 0
          type: string
          description: County
          example: Lancashire
        postCode:
          maxLength: 12
          minLength: 0
          type: string
          description: Postcode
          example: HT3 4AB
        countryCode:
          maxLength: 3
          minLength: 0
          type: string
          description: Country code
          example: GB

    BankAccountHolder:
      additionalProperties: false
      required:
        - id
      type: object
      description: Identifies the investor account holder or third party account holder.
      properties:
        id:
          maxLength: 11
          minLength: 0
          type: string
          description: The identifier of the investor holding the account. For third party account holders use the third party sequence number.
        thirdParty:
          type: boolean
          default: false
          description: Indicates if the bank account holder is a third party to the investment - for example, an employer. Defaults to false.

    BankAccountDetails:
      anyOf:
        - required:
            - number
            - sortCode
        - required:
            - iban
            - bicSwift
        - required:
            - number
            - bicSwift
      type: object
      properties:
        number:
          pattern: ^\d{5,15}$
          type: string
          description: Account number. Required for GBP and USD bank accounts.
        sortCode:
          pattern: ^\d{6}$
          type: string
          description: Sort code, without hyphens. Required for GBP accounts.
        iban:
          pattern: ^[A-Z]{2}\d{2}[A-Z0-9]{10,30}$
          type: string
          description: IBAN (ISO 13616), without spaces. Required for EUR bank accounts.
        bicSwift:
          pattern: ^[A-Za-z]{6}[2-9A-Za-z][0-9A-Na-nP-Zp-z]([A-Za-z0-9]{3}|x{3})?$
          type: string
          description: BIC or Swift code (ISO 9362), either 8 or 11 characters. Required for EUR and USD bank accounts.

    BankAccount:
      allOf:
        - $ref: "#/components/schemas/BankAccountDetails"
        - type: object
          required:
            - holders
            - name
          properties:
            accountId:
              format: string
              description: Unique SS&C Hubwise Account identifier
              maxLength: 11
              minLength: 11
              type: string
              readOnly: true
              example: HW00013451A
            tenantId:
              format: string
              description: Unique SS&C Hubwise Tenant identifier
              maxLength: 7
              minLength: 7
              type: string
              readOnly: true
              example: HUBWISE
            adviserId:
              format: string
              description: Unique SS&C Hubwise Adviser identifier
              maxLength: 7
              minLength: 7
              readOnly: true
              type: string
              example: E273053
            name:
              maxLength: 70
              minLength: 5
              type: string
              description: The name of the account holder.
            currency:
              type: string
              default: GBP
              minLength: 3
              maxLength: 3
              description: The ISO 4217 currency code of the bank account. Defaults to GBP.
            status:
              type: string
              description: Status of the bank account
              readOnly: true
              enum:
                - ACTIVE
                - REFERRED
                - REJECTED
                - DELETED
                - UNCHECKED
                - WAITING_FOR_CUSTOMER
            holders:
              maxItems: 20
              minItems: 1
              type: array
              description: The one or more holders of the bank account.
              items:
                $ref: "#/components/schemas/BankAccountHolder"
            declarations:
              writeOnly: true
              type: array
              items:
                $ref: "#/components/schemas/Declaration"

    Declaration:
      type: object
      additionalProperties: false
      properties:
        templateId:
          description: Unique SS&C Hubwise Template identifier
          maxLength: 50
          type: string
          example: TEMPLATE_ID_VALUE
        adviserId:
          format: string
          description: Unique SS&C Hubwise Adviser identifier assigned to the declaration
          maxLength: 7
          minLength: 7
          type: string
          example: E273053
        acknowledgement:
          description: To determine if the declaration has been read and agreed
          type: boolean
          example: true
        acknowledgementReason:
          description: The declaration acknowledgement reason, if the decalaration has not been agreed
          type: string
          maxLength: 500

    LinkedInvestor:
      description: And Investor linked to the account and their relationship to the account
      required:
        - id
        - relationship
      type: object
      additionalProperties: false
      properties:
        id:
          format: string
          description: Unique SS&C Hubwise Investor identifier
          maxLength: 11
          minLength: 11
          type: string
          example: HWI00007126
        relationship:
          description: The relationship the investor has to the account
          enum:
            - OWNER
            - REGISTERED_CONTACT
          type: string
          example: OWNER

    Allowance:
      additionalProperties: false
      type: object
      readOnly: true
      properties:
        remainingAllowance:
          type: number
          description: the investors remaining allowance in current tax year
          readOnly: true
          example: 20000
        subscribedAmount:
          type: number
          description: The amoune the investor has subscribed in current tax year
          readOnly: true
          example: 0
      description: The investor allowance information for the current tax year for and ISA or JISA

    ContactDetails:
      type: object
      additionalProperties: false
      properties:
        contactPhone:
          maxLength: 20
          minLength: 0
          type: string
          description: Contact Phone
          format: string
          example: "01619465555"
        homePhone:
          maxLength: 20
          minLength: 0
          type: string
          description: Home Phone
          format: string
          example: "01619464444"
        mobilePhone:
          maxLength: 20
          minLength: 0
          type: string
          description: Mobile Phone
          format: string
          example: "07877156340"
        email:
          maxLength: 256
          minLength: 1
          type: string
          description: email address for notifications
          format: string
          example: john.doe@outlook.com

    ReadOnlyContactDetails:
      allOf:
        - $ref: '#/components/schemas/ContactDetails'
        - type: object
          readOnly: true

    IncomeOptionHeader:
      type: object
      additionalProperties: false
      properties:
        incomeOption:
          $ref: '#/components/schemas/IncomeOption'

    IncomeOption:
      type: object
      additionalProperties: false
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - CASH
            - REINVEST
            - WITHDRAW
        reinvestmentDate:
          type: string
          format: date
        withdrawalDate:
          type: string
          format: date
        withdrawalFrequency: 
          type: string
          enum: 
            - MONTHLY
            - QUARTERLY
            - HALF_YEARLY
            - YEARLY
        accountNumber: 
          type: string
          pattern: ^[0-9]{8}$
        sortCode:
          type: string
          pattern: ^[0-9]{6}$
        accountName:
          type: string
          maxLength: 50

    IncomeAndInvestment:
      description: income and investment details are mandatory for an adult individual or court appointed deputy investor type
      type: object
      additionalProperties: false
      properties:
        occupation:
          type: string
          description: The investors occupation
          format: string
          example: OTHER
          enum:
            - BUSINESS_OWNER
            - C_SUITE_EXECUTIVE
            - CORPORATE
            - CORPORATE_PROFESSIONAL
            - EDUCATION_PROFESSIONAL
            - GOVERNMENT_EMPLOYEE
            - HEAD_OF_STATE
            - INFLUENCER
