                      "adviserId": "E008469",
                      "templateId": "TRANSFER_IN",
                      "acknowledgement": true
                    }
                  ]
                }
        required: true
      responses:
        "200":
          description: Transfers created successfully
          headers:
            Request-Id:
              $ref: '#/components/headers/Request-Id'
          content:
