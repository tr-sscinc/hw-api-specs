  /accounts/{accountId}/inter-account-transfers/{interAccountTransfersId}:

    patch:
      tags:
        - Accounts
      summary: Update an inter-account transfer
      description: >-
        Partially updates an existing inter-account transfer record.

        For pending accounts, both one-off and regular transfers may be updated. For activated accounts, only regular transfers may be updated.

        The transfer must not already be archived. All update fields are optional; the same validation rules as creation apply.
      operationId: modifyInterAccountTransfer
      parameters:
        - $ref: '#/components/parameters/Request-Id'
        - name: accountId
          in: path
          description: Unique SS&C Wealth Platform Account identifier (destination account)
          required: true
          schema:
            type: string
            minLength: 11
            maxLength: 11
          example: HW00013451A
        - name: interAccountTransfersId
          in: path
          description: Unique SS&C Wealth Platform inter-account transfer identifier
          required: true
          schema:
            type: integer
            format: int64
          example: 1001
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InterAccountTransferPatch"
            examples:
              Ex1:
                summary: Update transfer value and next date
                value:
                  {
                    "value": 7500.00,
                    "nextDate": "2026-09-01"
                  }
      responses:
        "200":
          description: Inter-account transfer updated successfully.
          headers:
            Request-Id:
              $ref: '#/components/headers/Request-Id'
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InterAccountTransfer"
              examples:
                Ex1:
                  summary: Transfer updated
                  value:
                    {
                      "id": 1001,
                      "accountId": "HW00013451A",
                      "tenantId": "HUBWISE",
                      "adviserId": "E273053",
                      "value": 7500.00,
                      "currency": "GBP",
                      "frequency": "ONE_OFF",
                      "fundingAccountId": "HW00013452A",
                      "nextDate": "2026-09-01",
                      "status": "INCEPTED"
                    }
        "400":
          $ref: "#/components/responses/400-BadRequest"
        "401":
          $ref: "#/components/responses/401-Unauthorized"
        "403":
          $ref: "#/components/responses/403-Forbidden"
        "404":
          $ref: "#/components/responses/404-NotFound"
        "500":
          $ref: "#/components/responses/500-ServerError"

    delete:
      tags:
        - Accounts
      summary: Archive an inter-account transfer
      description: >-
        Archives (soft-deletes) an existing inter-account transfer record.

        For pending accounts, both one-off and regular transfers may be archived. For activated accounts, only regular transfers may be archived.

        The transfer must not already be archived and its next date must be in the future.
      operationId: removeInterAccountTransfer
      parameters:
        - $ref: '#/components/parameters/Request-Id'
        - name: accountId
          in: path
          description: Unique SS&C Wealth Platform Account identifier
          required: true
          schema:
            type: string
            minLength: 11
            maxLength: 11
          example: HW00013451A
        - name: interAccountTransfersId
          in: path
          description: Unique SS&C Wealth Platform inter-account transfer identifier
          required: true
          schema:
            type: integer
            format: int64
          example: 1001
      responses:
        "204":
          description: Inter-account transfer archived successfully.
          headers:
            Request-Id:
              $ref: '#/components/headers/Request-Id'
        "400":
          $ref: "#/components/responses/400-BadRequest-NoBody"
        "401":
          $ref: "#/components/responses/401-Unauthorized"
        "403":
          $ref: "#/components/responses/403-Forbidden"
        "404":
          $ref: "#/components/responses/404-NotFound"
        "500":
          $ref: "#/components/responses/500-ServerError"

  /accounts/{accountId}/fees:
    
    post:
      tags:
        - Accounts
      summary: Create account fee(s)
      description: >-
        Creates one or more fee records for a single investment account.
        

        This endpoint should be used when adding fees to an account. Supported fee types are defined in the API schema.
        
        
        The following fee types are automatically configured by the system and cannot be created or modified via the API:
        
        
        1.	Product Annual
        
        
        2.	Platform Annual
       
       
        3.	Platform Initial
        
        
        4.	Discretionary Model Management
        
        
        Fees associated with money movements or transfers must be created and maintained using the money movement or transfer endpoints.
       
       
        If a fee code is supplied, the corresponding fee code details will be returned in the response under the band details section.
       
       
        The account record must exist before creating fee records.


      operationId: createAccountFees
      parameters:
        - $ref: '#/components/parameters/Request-Id'
        - name: accountId
          in: path
          description: Unique SS&C Wealth Platform Account identifier
          required: true
          schema:
            type: string
            maxLength: 11
          example: HW00013451A
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FeesHeader"
            examples:
              Ex1:
                summary: Add a banded annual adviser fee to the account.
                value: 
                  {
                    "fees": [
                      {
                        "type": "ADVISER_ANNUAL",
                        "code": "AFGVCD",
                        "vatIncluded": true,
                        "startDate": "2025-04-28"
                      }
                    ],
                    "declarations": [
                      {
                        "templateId": "AMENDMENT_CONSENT",
                        "adviserId": "E008469",
                        "acknowledgement": true
                      }
                    ]
                  }
              Ex2:
                summary: Add a flat percentage adviser annual fee to the account.
                value: 
                  {
                    "fees": [
                      {
                        "type": "ADVISER_ANNUAL",
                        "percentage": 0.25,
                        "vatIncluded": true,
                        "startDate": "2025-04-28"
                      }
                    ],
                    "declarations": [
                      {
                        "templateId": "AMENDMENT_CONSENT",
                        "adviserId": "E008469",
                        "acknowledgement": true
